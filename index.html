<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:monospace;background:#c8ccd8;color:#2a2a4a;user-select:none;}
.checker-area{
  background-color:#aaaaaa;
  background-image:linear-gradient(45deg,#999 25%,transparent 25%),linear-gradient(-45deg,#999 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#999 75%),linear-gradient(-45deg,transparent 75%,#999 75%);
  background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;
  width:100%;height:220px;display:flex;align-items:center;justify-content:center;
}
.controls-bar{background:#9aa2b8;border-radius:12px 12px 0 0;padding:8px 10px 10px;}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.silhouettes{display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;}
.color-swatches{display:flex;gap:3px;align-items:center;}
.color-swatch{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;}
.color-swatch.selected{border-color:#fff;}
.bottom-row{display:flex;gap:10px;align-items:flex-start;}
.dpad-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.dpad-wrap{position:relative;width:88px;height:88px;flex-shrink:0;}
.dpad-bg{width:88px;height:88px;border-radius:50%;background:linear-gradient(145deg,#6a60d0,#3d3490);box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2);}
.dpad-btn{position:absolute;width:26px;height:26px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.85);border-radius:4px;}
.dpad-btn:hover{color:#fff;background:rgba(255,255,255,.15);}
.dpad-center{top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;}
.dpad-up{top:3px;left:50%;transform:translateX(-50%);}
.dpad-down{bottom:3px;left:50%;transform:translateX(-50%);}
.dpad-left{left:3px;top:50%;transform:translateY(-50%);}
.dpad-right{right:3px;top:50%;transform:translateY(-50%);}
.parts-area{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:4px;}
.part-row{display:flex;align-items:center;gap:4px;}
.part-name{font-size:8px;color:#7070a0;width:38px;text-align:right;flex-shrink:0;letter-spacing:.05em;text-transform:uppercase;}
.part-options{display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
.part-options::-webkit-scrollbar{height:3px;}
.part-options::-webkit-scrollbar-thumb{background:#6a72a0;border-radius:2px;}
.part-btn{width:38px;height:38px;border-radius:7px;border:1.5px solid #7a82a8;background:#8a92b0;cursor:pointer;padding:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.part-btn:hover{border-color:#b0b8d0;background:#9aa2c0;}
.part-btn.selected{border:2px solid #fff;background:#534AB7;box-shadow:0 0 8px rgba(83,74,183,.6);}
.part-btn canvas{display:block;image-rendering:pixelated;}
.sil-btn{width:38px;height:46px;border-radius:7px;border:1.5px solid #7a82a8;background:#8a92b0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.sil-btn:hover{border-color:#b0b8d0;background:#9aa2c0;}
.sil-btn.selected{border:2px solid #fff;background:#534AB7;box-shadow:0 0 8px rgba(83,74,183,.6);}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
.speed-row{display:flex;align-items:center;gap:5px;}
.speed-row label{font-size:8px;color:#7070a0;}
.speed-row input{width:60px;accent-color:#534AB7;}
.speed-val{font-size:8px;color:#c5c8e0;min-width:24px;}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:5px;cursor:pointer;border:none;background:#534AB7;color:#fff;font-family:monospace;font-weight:600;}
.btn-sm:hover{background:#3C3489;}
.btn-rand{background:#6a72a0;}.btn-rand:hover{background:#5a6290;}
.section-divider{font-size:7px;color:#5060a0;letter-spacing:.1em;text-transform:uppercase;padding:2px 0 1px 38px;border-top:1px solid #8090a8;margin-top:2px;}
</style></head>
<body>
<div class="checker-area">
  <canvas id="cv-big" width="192" height="192" style="width:192px;height:192px;"></canvas>
</div>
<div class="controls-bar">
  <div class="top-row">
    <div class="silhouettes" id="opts-body"></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="display:flex;gap:4px;">
        <button class="btn-sm btn-rand" onclick="randomize()">⚄ Random</button>
        <button class="btn-sm" onclick="downloadSheet()">↓ Export</button>
      </div>
      <div class="color-swatches" id="color-row"></div>
    </div>
  </div>
  <div class="bottom-row">
    <div class="dpad-col">
      <div class="dpad-wrap">
        <div class="dpad-bg"></div>
        <button class="dpad-btn dpad-up" onclick="setDir('up')">▲</button>
        <button class="dpad-btn dpad-down" onclick="setDir('down')">▼</button>
        <button class="dpad-btn dpad-left" onclick="setDir('left')">◀</button>
        <button class="dpad-btn dpad-right" onclick="setDir('right')">▶</button>
        <button class="dpad-btn dpad-center" onclick="toggleAnim()" id="anim-btn">⏸</button>
      </div>
      <div class="speed-row">
        <label>SPD</label>
        <input type="range" min="60" max="500" value="200" step="20" oninput="updateSpeed(this.value)">
        <span class="speed-val" id="speed-val">200</span>
      </div>
    </div>
    <div class="parts-area">
      <div class="section-divider">— appearance —</div>
      <div class="part-row"><div class="part-name">Hat</div><div class="part-options" id="opts-hat"></div></div>
      <div class="part-row"><div class="part-name">Eyes</div><div class="part-options" id="opts-eyes"></div></div>
      <div class="part-row"><div class="part-name">Ears</div><div class="part-options" id="opts-ears"></div></div>
      <div class="part-row"><div class="part-name">Mouth</div><div class="part-options" id="opts-mouth"></div></div>
      <div class="part-row"><div class="part-name">Arms</div><div class="part-options" id="opts-arms"></div></div>
      <div class="part-row"><div class="part-name">Wings</div><div class="part-options" id="opts-wings"></div></div>
      <div class="part-row"><div class="part-name">Tail</div><div class="part-options" id="opts-tail"></div></div>
    </div>
  </div>
</div>
<canvas id="cv-export" width="128" height="128" style="display:none;"></canvas>
<script>
const WALK_FRAMES=[
  {bob:0, legL:0, legR:0, armL:0, armR:0},
  {bob:-1,legL:-2,legR:2, armL:1, armR:-1},
  {bob:0, legL:0, legR:0, armL:0, armR:0},
  {bob:-1,legL:2, legR:-2,armL:-1,armR:1},
];
const COLORS=[
  {n:'white', b:'#e0e0e0',s:'#909090',l:'#f8f8f8',d:'#606060',o:'#444444'},
  {n:'sand',  b:'#d4a96a',s:'#7a4a18',l:'#f0cc98',d:'#5a3008',o:'#3a2000'},
  {n:'sky',   b:'#5ab0f0',s:'#0850a0',l:'#b0dcff',d:'#043070',o:'#022050'},
  {n:'teal',  b:'#30a890',s:'#005848',l:'#88dcd0',d:'#003830',o:'#002020'},
  {n:'lime',  b:'#88c030',s:'#386800',l:'#ccee80',d:'#204800',o:'#102800'},
  {n:'amber', b:'#f09820',s:'#803000',l:'#ffd880',d:'#501800',o:'#300800'},
  {n:'coral', b:'#e05050',s:'#800808',l:'#ff9898',d:'#500000',o:'#300000'},
  {n:'violet',b:'#9050c8',s:'#400878',l:'#d098f8',d:'#280048',o:'#180028'},
  {n:'rose',  b:'#d85090',s:'#700040',l:'#ff98c8',d:'#480028',o:'#280010'},
  {n:'stone', b:'#7088a0',s:'#283848',l:'#aac0d0',d:'#182430',o:'#0c1820'},
  {n:'black', b:'#383838',s:'#101010',l:'#606060',d:'#080808',o:'#000000'},
  {n:'gold',  b:'#e8b820',s:'#805000',l:'#fff080',d:'#503000',o:'#302000'},
];
const PARTS={body:8,hat:11,eyes:8,ears:10,mouth:7,arms:8,wings:6,tail:9};
let sel={body:0,hat:0,eyes:1,ears:1,mouth:1,arms:1,wings:0,tail:0,color:2};
let curDir='down',animPlaying=true,animTick=0,animInterval=null,animSpeed=200;

// ── primitives ──
function px(c,x,y,col){if(x<0||x>31||y<0||y>31)return;c.fillStyle=col;c.fillRect(x,y,1,1);}
function row(c,x,y,w,col){c.fillStyle=col;c.fillRect(x,y,w,1);}
function col(c,x,y,h,color){c.fillStyle=color;c.fillRect(x,y,1,h);}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();c.fill();}
function circ(c,cx,cy,r){c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fill();}
function tri(c,x1,y1,x2,y2,x3,y3){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.lineTo(x3,y3);c.closePath();c.fill();}

// ═══════════════════════════════════════════════════
// ISOLATED PART PREVIEW — draw only the part centred
// ═══════════════════════════════════════════════════
function drawPartOnly(ctx,part,idx,C){
  ctx.clearRect(0,0,32,32);
  if(part==='body'){drawCreature(ctx,{...sel,body:idx},'down',0);return;}
  const {b,s:sh,l,d,o}=C;
  switch(part){
    case 'hat':
      if(idx===0){drawNoneIcon(ctx);return;}
      // Draw hat at a neutral vertical position so it's centred in the 32x32
      drawHatAt(ctx,idx,C,16,12,false,false);
      break;
    case 'eyes':
      // Two eyes centred horizontally, middle of canvas
      drawEyeAt(ctx,idx,9,14);
      drawEyeAt(ctx,idx,19,14);
      break;
    case 'ears':
      if(idx===0){drawNoneIcon(ctx);return;}
      // Faint head circle for context, ears positioned relative to it
      ctx.fillStyle=o+'33'; circ(ctx,16,18,8);
      drawEarsAt(ctx,idx,C,'front',16,18);
      break;
    case 'mouth':
      drawMouthAt(ctx,idx,14,14);
      break;
    case 'arms':
      if(idx===0){drawNoneIcon(ctx);return;}
      drawArmsPreviewOnly(ctx,idx,C);
      break;
    case 'wings':
      if(idx===0){drawNoneIcon(ctx);return;}
      drawWingsPreviewOnly(ctx,idx,C);
      break;
    case 'tail':
      if(idx===0){drawNoneIcon(ctx);return;}
      drawTailPreviewOnly(ctx,idx,C);
      break;
  }
}

function drawNoneIcon(ctx){
  ctx.strokeStyle='#8080a0';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(16,16,7,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(11,11);ctx.lineTo(21,21);ctx.stroke();
}

// ── EARS preview: draw ears relative to a head centre cx,cy ──
// This is the single source of truth for ear placement in ALL contexts
function drawEarsAt(ctx,e,C,dir,hcx,hcy){
  if(e===0)return;
  const {b,s:sh,l,o}=C;
  const side=dir==='left'||dir==='right';
  const flip=dir==='right';

  if(e===1){ // cat round — sit on top corners of head
    if(side){
      const ex=flip?hcx+6:hcx-6;
      const ey=hcy-7;
      ctx.fillStyle=o;circ(ctx,ex,ey,5);ctx.fillStyle=sh;circ(ctx,ex,ey,4);ctx.fillStyle=b;circ(ctx,ex,ey,4);ctx.fillStyle=l;px(ctx,ex-1,ey-2,l);
    } else {
      [[hcx-7,hcy-7],[hcx+7,hcy-7]].forEach(([ex,ey])=>{
        ctx.fillStyle=o;circ(ctx,ex,ey,5);ctx.fillStyle=sh;circ(ctx,ex,ey,4);ctx.fillStyle=b;circ(ctx,ex,ey,4);ctx.fillStyle=l;px(ctx,ex-1,ey-2,l);
      });
    }
  }
  else if(e===2){ // pointy elf
    if(side){
      const ex=flip?hcx+6:hcx-6;const ey=hcy-6;
      ctx.fillStyle=o;tri(ctx,ex,ey+2,ex-4,ey-8,ex+4,ey-8);ctx.fillStyle=sh;tri(ctx,ex,ey+1,ex-3,ey-7,ex+3,ey-7);ctx.fillStyle=b;tri(ctx,ex,ey,ex-2,ey-6,ex+2,ey-6);ctx.fillStyle=l;px(ctx,ex,ey-5,l);
    } else {
      [[hcx-7,hcy-6],[hcx+7,hcy-6]].forEach(([ex,ey])=>{
        ctx.fillStyle=o;tri(ctx,ex,ey+2,ex-4,ey-8,ex+4,ey-8);ctx.fillStyle=sh;tri(ctx,ex,ey+1,ex-3,ey-7,ex+3,ey-7);ctx.fillStyle=b;tri(ctx,ex,ey,ex-2,ey-6,ex+2,ey-6);ctx.fillStyle=l;px(ctx,ex,ey-5,l);
      });
    }
  }
  else if(e===3){ // horns — top of head
    const positions=side?[[flip?hcx+4:hcx-4,hcy-8]]:[[hcx-6,hcy-8],[hcx+6,hcy-8]];
    positions.forEach(([hx,hy])=>{
      ctx.fillStyle='#600000';tri(ctx,hx,hy+4,hx-2,hy-4,hx+3,hy-4);
      ctx.fillStyle='#c62828';tri(ctx,hx,hy+3,hx-1,hy-3,hx+2,hy-3);
      ctx.fillStyle='#ff6060';px(ctx,hx,hy-2,l);
    });
  }
  else if(e===4){ // antenna — centre top
    const positions=side?[[flip?hcx+3:hcx-3,hcy]]:[[hcx,hcy],[hcx-6,hcy+2]];
    positions.slice(0,side?1:2).forEach(([ax,ay])=>{
      ctx.fillStyle=o;ctx.fillRect(ax-1,ay-11,3,12);ctx.fillStyle='#504000';ctx.fillRect(ax-1,ay-11,3,11);ctx.fillStyle='#c0c000';ctx.fillRect(ax-1,ay-11,3,10);ctx.fillStyle='#ffff40';ctx.fillRect(ax,ay-11,1,9);
      ctx.fillStyle=o;circ(ctx,ax,ay-11,3);ctx.fillStyle='#ffcc00';circ(ctx,ax,ay-11,2);ctx.fillStyle='#ffff80';px(ctx,ax-1,ay-12,'#ffff80');
    });
  }
  else if(e===5){ // floppy — hang down the sides of head
    if(side){
      // Single floppy ear on the near side, hanging from head level
      const ex=flip?hcx+8:hcx-8;
      const ey=hcy-4;
      const ew=flip?-6:6;
      ctx.fillStyle=o;  rr(ctx,Math.min(ex,ex+ew)-1,ey-1,8,16,3);
      ctx.fillStyle=sh; rr(ctx,Math.min(ex,ex+ew),ey,6,14,2);
      ctx.fillStyle=b;  rr(ctx,Math.min(ex,ex+ew),ey,6,13,2);
      // inner shading stripe
      ctx.fillStyle=sh+'66'; ctx.fillRect(Math.min(ex,ex+ew)+1,ey+1,1,11);
    } else {
      // Two floppy ears, hanging at sides of head
      [[hcx-12,hcy-4],[hcx+6,hcy-4]].forEach(([ex,ey])=>{
        ctx.fillStyle=o;  rr(ctx,ex-1,ey-1,8,16,3);
        ctx.fillStyle=sh; rr(ctx,ex,ey,6,14,2);
        ctx.fillStyle=b;  rr(ctx,ex,ey,6,13,2);
        ctx.fillStyle=sh+'66'; ctx.fillRect(ex+1,ey+1,1,11);
      });
    }
  }
  else if(e===6){ // fin / wing ears
    if(side){
      const fx=flip?hcx+8:hcx-8;
      const fy=hcy-4;
      ctx.fillStyle=o; tri(ctx,flip?fx-2:fx+2,fy+4,flip?fx+8:fx-8,fy-8,flip?fx+2:fx+2,fy-1);
      ctx.fillStyle=sh;tri(ctx,flip?fx-2:fx+2,fy+4,flip?fx+6:fx-6,fy-6,flip?fx+2:fx+2,fy);
      ctx.fillStyle=b; tri(ctx,flip?fx-2:fx+2,fy+3,flip?fx+5:fx-5,fy-5,flip?fx+2:fx+2,fy);
      ctx.fillStyle=l; px(ctx,flip?fx+4:fx-4,fy-4,l);
    } else {
      ctx.fillStyle=o;  tri(ctx,hcx-8,hcy-2,hcx-16,hcy-14,hcx-5,hcy-8);tri(ctx,hcx+8,hcy-2,hcx+16,hcy-14,hcx+5,hcy-8);
      ctx.fillStyle=sh; tri(ctx,hcx-8,hcy-2,hcx-14,hcy-12,hcx-5,hcy-7);tri(ctx,hcx+8,hcy-2,hcx+14,hcy-12,hcx+5,hcy-7);
      ctx.fillStyle=b;  tri(ctx,hcx-8,hcy-3,hcx-13,hcy-11,hcx-5,hcy-7);tri(ctx,hcx+8,hcy-3,hcx+13,hcy-11,hcx+5,hcy-7);
      ctx.fillStyle=l;  px(ctx,hcx-12,hcy-10,l);px(ctx,hcx+12,hcy-10,l);
    }
  }
  else if(e===7){ // bear ears — wide flat circles at top
    if(side){
      const ex=flip?hcx+7:hcx-7; const ey=hcy-7;
      ctx.fillStyle=o;circ(ctx,ex,ey,6);ctx.fillStyle=sh;circ(ctx,ex,ey,5);ctx.fillStyle=b;circ(ctx,ex,ey,5);ctx.fillStyle='#c06040';circ(ctx,ex,ey,3);ctx.fillStyle='#e08060';circ(ctx,ex,ey,2);
    } else {
      [[hcx-8,hcy-7],[hcx+8,hcy-7]].forEach(([ex,ey])=>{
        ctx.fillStyle=o;circ(ctx,ex,ey,6);ctx.fillStyle=sh;circ(ctx,ex,ey,5);ctx.fillStyle=b;circ(ctx,ex,ey,5);ctx.fillStyle='#c06040';circ(ctx,ex,ey,3);ctx.fillStyle='#e08060';circ(ctx,ex,ey,2);
      });
    }
  }
  else if(e===8){ // speaker-dish — concentric rings like a horn bell or satellite ear
    const pairs=side?[[flip?hcx+7:hcx-7,hcy-4]]:[[hcx-8,hcy-4],[hcx+8,hcy-4]];
    pairs.forEach(([ex,ey])=>{
      ctx.fillStyle=o;circ(ctx,ex,ey,6);
      ctx.fillStyle=sh;circ(ctx,ex,ey,5);
      ctx.fillStyle=b;circ(ctx,ex,ey,4);
      ctx.fillStyle=sh+'88';circ(ctx,ex,ey,2);
      ctx.fillStyle=o;circ(ctx,ex,ey,1);
      // rim highlight
      ctx.fillStyle=l+'66';px(ctx,ex-2,ey-3,l+'66');
    });
  }
  else if(e===9){ // scroll/volute — like a violin peg or horn scroll, tight spiral
    const pairs=side?[[flip?hcx+7:hcx-7,hcy-6]]:[[hcx-8,hcy-6],[hcx+8,hcy-6]];
    pairs.forEach(([ex,ey])=>{
      // outer coil
      ctx.fillStyle=o;rr(ctx,ex-4,ey,8,7,3);
      ctx.fillStyle=sh;rr(ctx,ex-3,ey+1,6,6,2);
      ctx.fillStyle=b;rr(ctx,ex-3,ey+1,6,5,2);
      // inner whorl
      ctx.fillStyle=sh;circ(ctx,ex,ey+4,2);
      ctx.fillStyle=o;circ(ctx,ex,ey+4,1);
      // stem connecting to head
      ctx.fillStyle=o;ctx.fillRect(ex-1,ey-3,2,4);
      ctx.fillStyle=sh;ctx.fillRect(ex-1,ey-2,2,3);
      ctx.fillStyle=l;px(ctx,ex-1,ey,l);
    });
  }
}

// ── ARMS preview (isolated) ──
function drawArmsPreviewOnly(ctx,a,C){
  const {b,s:sh,l,o}=C;
  // Draw both arms spread wide, vertically centred around y=16
  [[3,16],[24,16]].forEach(([ax,ay])=>{
    if(a===1){ctx.fillStyle=o;ctx.fillRect(ax-1,ay-1,5,8);ctx.fillStyle=sh;ctx.fillRect(ax,ay,3,7);ctx.fillStyle=b;ctx.fillRect(ax,ay,3,6);ctx.fillStyle=l;px(ctx,ax,ay,l);}
    else if(a===2){ctx.fillStyle=o;rr(ctx,ax-1,ay-1,5,10,2);ctx.fillStyle=sh;rr(ctx,ax,ay,3,9,1);ctx.fillStyle=b;rr(ctx,ax,ay,3,8,1);ctx.fillStyle=sh;ctx.fillRect(ax,ay+6,3,2);ctx.fillStyle=l;px(ctx,ax,ay,l);}
    else if(a===3){ctx.fillStyle=o;ctx.fillRect(ax-1,ay-1,5,8);ctx.fillStyle=sh;ctx.fillRect(ax,ay,3,7);ctx.fillStyle=b;ctx.fillRect(ax,ay,3,6);ctx.fillStyle=o;tri(ctx,ax,ay,ax+4,ay,ax+2,ay-3);ctx.fillStyle=sh;tri(ctx,ax+1,ay,ax+3,ay,ax+2,ay-2);ctx.fillStyle=l;px(ctx,ax,ay,l);}
    else if(a===4){ctx.fillStyle=o;circ(ctx,ax+1,ay+2,5);ctx.fillStyle=sh;circ(ctx,ax+1,ay+2,4);ctx.fillStyle=b;circ(ctx,ax+1,ay+1,4);ctx.fillStyle=l;px(ctx,ax,ay,l);}
    else if(a===5){ctx.fillStyle=o;ctx.fillRect(ax-1,ay-1,5,6);ctx.fillStyle=sh;ctx.fillRect(ax,ay,3,5);ctx.fillStyle=b;ctx.fillRect(ax,ay,3,4);ctx.fillStyle=l;px(ctx,ax,ay,l);}
    else if(a===6){ctx.fillStyle=o;ctx.fillRect(ax,ay-1,3,11);ctx.fillStyle=sh;ctx.fillRect(ax,ay,2,10);ctx.fillStyle=b;ctx.fillRect(ax,ay,2,9);ctx.fillStyle='#fff8e0';ctx.fillRect(ax,ay-1,2,3);ctx.fillStyle=l;px(ctx,ax,ay-1,l);}

// ── WINGS preview (isolated, scaled to fit) ──
function drawWingsPreviewOnly(ctx,w,C){
  // Render at half-size offset so wings don't clip
  ctx.save();ctx.translate(0,4);
  drawWingsFront(ctx,{wings:w},C,0);
  ctx.restore();
}

// ── TAIL preview (isolated) ──
function drawTailPreviewOnly(ctx,t,C){
  // Draw tail centred — offset so it shows in middle of canvas
  const tmp=document.createElement('canvas');tmp.width=32;tmp.height=32;
  const tc=tmp.getContext('2d');tc.imageSmoothingEnabled=false;
  // draw on a virtual body at y=0 so tail appears at bottom of tmp
  drawTailBack(tc,{tail:t},C,0);
  // shift up by 10px so tail sits in centre of preview
  ctx.drawImage(tmp,0,-8);
}

// ═══════════════════════════════════════════════════
// FULL CREATURE DRAW
// ═══════════════════════════════════════════════════
function drawCreature(ctx,s,dir,wf){
  const C=COLORS[s.color];
  ctx.clearRect(0,0,32,32);
  const {bob,legL,legR,armL,armR}=WALK_FRAMES[wf];
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(16,31,5,1.5,0,0,Math.PI*2);ctx.fill();
  if(dir==='down')    drawFront(ctx,s,C,bob,legL,legR,armL,armR,false);
  else if(dir==='up') drawFront(ctx,s,C,bob,legL,legR,armL,armR,true);
  else                drawSide(ctx,s,dir,C,bob,legL,legR,armL,armR);
}

function drawFront(ctx,s,C,bob,legL,legR,armL,armR,isBack){
  drawWingsFront(ctx,s,C,bob);
  drawArmFront(ctx,s,C,'left',bob,armL,true);
  drawArmFront(ctx,s,C,'right',bob,armR,true);
  ctx.save();ctx.translate(0,bob);
  drawBodyFront(ctx,s,C,isBack);
  // ears use the unified function, hcx=16,hcy=16
  drawEarsAt(ctx,s.ears,C,isBack?'back':'front',16,16);
  ctx.restore();
  drawArmFront(ctx,s,C,'left',bob,armL,false);
  drawArmFront(ctx,s,C,'right',bob,armR,false);
  drawHat(ctx,s,C,'front',bob);
  if(!isBack){drawEyesFront(ctx,s,bob);drawMouthFront(ctx,s,bob);}
  if(isBack&&s.tail>0)drawTailBack(ctx,s,C,bob);
  drawLegFront(ctx,C,11,legL,'left');
  drawLegFront(ctx,C,17,legR,'right');
}

function drawLegFront(ctx,C,lx,dy,side){
  const {b,s:sh,l,d,o}=C;const y=24+dy;
  ctx.fillStyle=o;ctx.fillRect(lx,y,4,5);
  ctx.fillStyle=sh;ctx.fillRect(lx,y,4,4);
  ctx.fillStyle=b;ctx.fillRect(lx,y,4,3);
  ctx.fillStyle=l;px(ctx,lx,y,l);
  const fx=side==='left'?lx-2:lx;
  ctx.fillStyle=o;ctx.fillRect(fx,y+4,7,3);
  ctx.fillStyle=d;ctx.fillRect(fx,y+4,7,2);
  ctx.fillStyle=sh;ctx.fillRect(fx+1,y+4,5,1);
  ctx.fillStyle=l;px(ctx,side==='left'?fx:fx+6,y+4,l);
}

function drawSide(ctx,s,dir,C,bob,legL,legR,armL,armR){
  const flip=dir==='right';
  const frontLegDy=flip?legR:legL;
  const backLegDy=flip?legL:legR;
  drawWingsSide(ctx,s,C,dir,bob);
  drawLegSide(ctx,C,dir,backLegDy,true);
  drawArmSide(ctx,s,C,dir,bob,flip?armR:armL,'back');
  ctx.save();ctx.translate(0,bob);
  drawBodySide(ctx,s,dir,C);
  drawEarsAt(ctx,s.ears,C,dir,flip?18:14,16);
  ctx.restore();
  drawArmSide(ctx,s,C,dir,bob,flip?armL:armR,'front');
  if(s.tail>0)drawTailSide(ctx,s,C,dir,bob);
  drawHat(ctx,s,C,dir,bob);
  drawEyeSide(ctx,s,dir,bob);
  drawMouthSide(ctx,s,dir,bob);
  drawLegSide(ctx,C,dir,frontLegDy,false);
}

function drawLegSide(ctx,C,dir,dy,isBack){
  const flip=dir==='right';const {b,s:sh,l,d,o}=C;
  const lx=isBack?(flip?15:13):(flip?13:15);const y=24+dy;
  ctx.fillStyle=o+(isBack?'88':'ff');ctx.fillRect(lx,y,4,5);
  if(!isBack){ctx.fillStyle=sh;ctx.fillRect(lx,y,4,4);ctx.fillStyle=b;ctx.fillRect(lx,y,4,3);ctx.fillStyle=l;px(ctx,lx,y,l);}
  else{ctx.fillStyle=sh+'99';ctx.fillRect(lx,y,4,4);ctx.fillStyle=b+'bb';ctx.fillRect(lx,y,4,3);}
  ctx.fillStyle=o+(isBack?'88':'ff');
  if(!flip){ctx.fillRect(lx-3,y+4,7,3);if(!isBack){ctx.fillStyle=d;ctx.fillRect(lx-3,y+4,7,2);ctx.fillStyle=sh;ctx.fillRect(lx-2,y+4,5,1);ctx.fillStyle=l;px(ctx,lx-3,y+4,l);}else{ctx.fillStyle=d+'aa';ctx.fillRect(lx-3,y+4,7,2);}}

// ── EYES ──

function drawEyesFront(ctx,s,bob){[[11,15],[19,15]].forEach(([x,y])=>drawEyeAt(ctx,s.eyes,x,y+bob));}

  else if(t===4){ctx.fillStyle=o;circ(ctx,flip?tx-3:tx+3,22+y,5);ctx.fillStyle=sh;circ(ctx,flip?tx-3:tx+3,22+y,4);ctx.fillStyle=b;circ(ctx,flip?tx-3:tx+3,21+y,4);ctx.fillStyle=l;px(ctx,flip?tx-5:tx+1,20+y,l);}

  else if(t===6){ctx.fillStyle=o;ctx.fillRect(flip?tx-7:tx,19+y,8,5);ctx.fillStyle=sh;ctx.fillRect(flip?tx-6:tx,20+y,6,4);ctx.fillStyle=b;ctx.fillRect(flip?tx-6:tx,19+y,6,4);ctx.fillStyle=l;row(ctx,flip?tx-6:tx,19+y,6,l);}
  else if(t===7){ctx.fillStyle=o;circ(ctx,flip?tx-2:tx+2,22+y,4);circ(ctx,flip?tx-5:tx+5,20+y,3);circ(ctx,flip?tx-2:tx+2,19+y,3);ctx.fillStyle=sh;circ(ctx,flip?tx-2:tx+2,22+y,3);circ(ctx,flip?tx-5:tx+5,20+y,2);circ(ctx,flip?tx-2:tx+2,19+y,2);ctx.fillStyle=b;circ(ctx,flip?tx-2:tx+2,21+y,3);circ(ctx,flip?tx-5:tx+5,19+y,2);circ(ctx,flip?tx-2:tx+2,18+y,2);ctx.fillStyle=l;px(ctx,flip?tx-4:tx+1,20+y,l);}
  else if(t===8){ // tuning fork side — two prongs side-on (one behind other, offset)
    const sx=flip?tx-4:tx;
    ctx.fillStyle=sh+'88';ctx.fillRect(sx+2,17+y,2,8); // back prong
    ctx.fillStyle=o;ctx.fillRect(sx,17+y,2,9);ctx.fillRect(sx,25+y,4,2); // front prong + stem
    ctx.fillStyle=sh;ctx.fillRect(sx,17+y,2,8);ctx.fillRect(sx,25+y,3,1);
    ctx.fillStyle=b;ctx.fillRect(sx,17+y,2,7);
    ctx.fillStyle=o;circ(ctx,sx+1,17+y,2);ctx.fillStyle=sh;circ(ctx,sx+1,17+y,1);
  }
  else if(t===9){ // soundwave side — zigzag ribbon
    const sx=flip?tx-6:tx;const sign=flip?-1:1;
    ctx.fillStyle=o;
    ctx.fillRect(sx,24+y,4,2);
    ctx.fillRect(sx+sign*2,22+y,4,2);
    ctx.fillRect(sx,20+y,4,2);
    ctx.fillRect(sx+sign*2,18+y,4,2);
    ctx.fillRect(sx,16+y,4,2);
    ctx.fillStyle=sh;
    ctx.fillRect(sx,24+y,3,1);ctx.fillRect(sx+sign*2,22+y,3,1);
    ctx.fillRect(sx,20+y,3,1);ctx.fillRect(sx+sign*2,18+y,3,1);ctx.fillRect(sx,16+y,3,1);
  }
}

// ── RENDER ──
function makeFrame(s,dir,wf){
  const c=document.createElement('canvas');c.width=32;c.height=32;
  const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=false;
  drawCreature(ctx,s,dir,wf);return c;
}
function renderBig(){
  const cv=document.getElementById('cv-big');
  const ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,192,192);
  ctx.drawImage(makeFrame(sel,curDir,animTick),0,0,192,192);
}
function renderSheet(){
  const sheet=document.getElementById('cv-export');
  const ctx=sheet.getContext('2d');ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,128,128);
  ['down','left','right','up'].forEach((dir,r)=>{
    WALK_FRAMES.forEach((_,wf)=>{ctx.drawImage(makeFrame(sel,dir,wf),wf*32,r*32);});
  });
}
function renderAll(){renderBig();renderSheet();}
function tick(){animTick=(animTick+1)%WALK_FRAMES.length;renderBig();}
function startAnim(){if(animInterval)clearInterval(animInterval);animInterval=setInterval(tick,animSpeed);}
function toggleAnim(){animPlaying=!animPlaying;document.getElementById('anim-btn').textContent=animPlaying?'⏸':'▶';if(animPlaying)startAnim();else clearInterval(animInterval);}
function updateSpeed(v){animSpeed=parseInt(v);document.getElementById('speed-val').textContent=v;if(animPlaying)startAnim();}
function setDir(d){curDir=d;renderBig();}
function downloadSheet(){
  renderSheet();
  document.getElementById('cv-export').toBlob(blob=>{
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='creature_128x128.png';
    document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
  },'image/png');
}
function randomize(){
  Object.keys(PARTS).forEach(p=>sel[p]=Math.floor(Math.random()*PARTS[p]));
  sel.color=Math.floor(Math.random()*COLORS.length);
  updateUI();renderAll();
}

// ── UI ──
function getC(){return COLORS[sel.color];}
function updateUI(){
  document.querySelectorAll('#opts-body .sil-btn').forEach((btn,i)=>btn.classList.toggle('selected',i===sel.body));
  Object.keys(PARTS).filter(p=>p!=='body').forEach(part=>{
    document.querySelectorAll(`#opts-${part} .part-btn`).forEach((btn,i)=>btn.classList.toggle('selected',i===sel[part]));
  });
  document.querySelectorAll('.color-swatch').forEach((sw,i)=>sw.classList.toggle('selected',i===sel.color));
  refreshAllPreviews();
}
function refreshAllPreviews(){
  document.querySelectorAll('#opts-body .sil-btn').forEach((btn,i)=>{
    const mc=btn.querySelector('canvas');if(!mc)return;
    const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
    drawCreature(mctx,{...sel,body:i},'down',0);
  });
  Object.keys(PARTS).filter(p=>p!=='body').forEach(part=>{
    document.querySelectorAll(`#opts-${part} .part-btn`).forEach((btn,i)=>{
      const mc=btn.querySelector('canvas');if(!mc)return;
      const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
      drawPartOnly(mctx,part,i,getC());
    });
  });
}
function buildColors(){
  const row=document.getElementById('color-row');
  COLORS.forEach((c,i)=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(i===sel.color?' selected':'');
    sw.style.background=c.b;sw.title=c.n;
    sw.onclick=()=>{sel.color=i;updateUI();renderAll();};
    row.appendChild(sw);
  });
}
function buildBody(){
  const container=document.getElementById('opts-body');
  for(let i=0;i<PARTS.body;i++){
    const btn=document.createElement('button');
    btn.className='sil-btn'+(i===sel.body?' selected':'');
    const mc=document.createElement('canvas');mc.width=32;mc.height=40;
    mc.style.cssText='width:30px;height:38px;display:block;image-rendering:pixelated;';
    const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
    drawCreature(mctx,{...sel,body:i},'down',0);
    btn.appendChild(mc);btn.onclick=()=>{sel.body=i;updateUI();renderAll();};
    container.appendChild(btn);
  }
}
function buildParts(part,count){
  const container=document.getElementById('opts-'+part);
  const hasNone=['hat','arms','wings','tail'].includes(part);
  for(let i=0;i<count;i++){
    const btn=document.createElement('button');
    btn.className='part-btn'+(i===sel[part]?' selected':'');
    if(i===0&&hasNone){
      btn.innerHTML='<span style="font-size:14px;color:#9090c0;line-height:34px;">✕</span>';
    } else {
      const mc=document.createElement('canvas');mc.width=32;mc.height=32;
      mc.style.cssText='width:32px;height:32px;display:block;image-rendering:pixelated;';
      const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
      drawPartOnly(mctx,part,i,getC());
      btn.appendChild(mc);
    }
    btn.onclick=()=>{sel[part]=i;updateUI();renderAll();};
    container.appendChild(btn);
  }
}

buildColors();
buildBody();
['hat','eyes','ears','mouth','arms','wings','tail'].forEach(p=>buildParts(p,PARTS[p]));
renderAll();
startAnim();
</script>
</body></html>
