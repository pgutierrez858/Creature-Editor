<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:monospace;background:#c8ccd8;color:#2a2a4a;user-select:none;}
.checker-area{
  background-color:#aaaaaa;
  background-image:linear-gradient(45deg,#999 25%,transparent 25%),linear-gradient(-45deg,#999 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#999 75%),linear-gradient(-45deg,transparent 75%,#999 75%);
  background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;
  width:100%;height:220px;display:flex;align-items:center;justify-content:center;
}
.controls-bar{background:#9aa2b8;border-radius:12px 12px 0 0;padding:8px 10px 10px;}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.silhouettes{display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;}
.color-swatches{display:flex;gap:3px;align-items:center;}
.color-swatch{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;}
.color-swatch.selected{border-color:#fff;}
.bottom-row{display:flex;gap:10px;align-items:flex-start;}
.dpad-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.dpad-wrap{position:relative;width:88px;height:88px;flex-shrink:0;}
.dpad-bg{width:88px;height:88px;border-radius:50%;background:linear-gradient(145deg,#6a60d0,#3d3490);box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2);}
.dpad-btn{position:absolute;width:26px;height:26px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.85);border-radius:4px;}
.dpad-btn:hover{color:#fff;background:rgba(255,255,255,.15);}
.dpad-center{top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;}
.dpad-up{top:3px;left:50%;transform:translateX(-50%);}
.dpad-down{bottom:3px;left:50%;transform:translateX(-50%);}
.dpad-left{left:3px;top:50%;transform:translateY(-50%);}
.dpad-right{right:3px;top:50%;transform:translateY(-50%);}
.parts-area{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:4px;}
.part-row{display:flex;align-items:center;gap:4px;}
.part-name{font-size:8px;color:#7070a0;width:34px;text-align:right;flex-shrink:0;letter-spacing:.05em;text-transform:uppercase;}
.part-options{display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
.part-options::-webkit-scrollbar{height:3px;}
.part-options::-webkit-scrollbar-thumb{background:#6a72a0;border-radius:2px;}
.part-btn{width:38px;height:38px;border-radius:7px;border:1.5px solid #7a82a8;background:#8a92b0;cursor:pointer;padding:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.part-btn:hover{border-color:#b0b8d0;background:#9aa2c0;}
.part-btn.selected{border:2px solid #fff;background:#534AB7;box-shadow:0 0 8px rgba(83,74,183,.6);}
.part-btn canvas{display:block;image-rendering:pixelated;}
.sil-btn{width:38px;height:46px;border-radius:7px;border:1.5px solid #7a82a8;background:#8a92b0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.sil-btn:hover{border-color:#b0b8d0;background:#9aa2c0;}
.sil-btn.selected{border:2px solid #fff;background:#534AB7;box-shadow:0 0 8px rgba(83,74,183,.6);}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
.speed-row{display:flex;align-items:center;gap:5px;}
.speed-row label{font-size:8px;color:#7070a0;}
.speed-row input{width:60px;accent-color:#534AB7;}
.speed-val{font-size:8px;color:#c5c8e0;min-width:24px;}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:5px;cursor:pointer;border:none;background:#534AB7;color:#fff;font-family:monospace;font-weight:600;}
.btn-sm:hover{background:#3C3489;}
.btn-rand{background:#6a72a0;}.btn-rand:hover{background:#5a6290;}
</style></head>
<body>
<div class="checker-area">
  <canvas id="cv-big" width="192" height="192" style="width:192px;height:192px;"></canvas>
</div>
<div class="controls-bar">
  <div class="top-row">
    <div class="silhouettes" id="opts-body"></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="display:flex;gap:4px;">
        <button class="btn-sm btn-rand" onclick="randomize()">⚄ Random</button>
        <button class="btn-sm" onclick="downloadSheet()">↓ Export</button>
      </div>
      <div class="color-swatches" id="color-row"></div>
    </div>
  </div>
  <div class="bottom-row">
    <div class="dpad-col">
      <div class="dpad-wrap">
        <div class="dpad-bg"></div>
        <button class="dpad-btn dpad-up" onclick="setDir('up')">▲</button>
        <button class="dpad-btn dpad-down" onclick="setDir('down')">▼</button>
        <button class="dpad-btn dpad-left" onclick="setDir('left')">◀</button>
        <button class="dpad-btn dpad-right" onclick="setDir('right')">▶</button>
        <button class="dpad-btn dpad-center" onclick="toggleAnim()" id="anim-btn">⏸</button>
      </div>
      <div class="speed-row">
        <label>SPD</label>
        <input type="range" min="60" max="500" value="200" step="20" oninput="updateSpeed(this.value)">
        <span class="speed-val" id="speed-val">200</span>
      </div>
    </div>
    <div class="parts-area">
      <div class="part-row"><div class="part-name">Hat</div><div class="part-options" id="opts-hat"></div></div>
      <div class="part-row"><div class="part-name">Eyes</div><div class="part-options" id="opts-eyes"></div></div>
      <div class="part-row"><div class="part-name">Ears</div><div class="part-options" id="opts-ears"></div></div>
      <div class="part-row"><div class="part-name">Mouth</div><div class="part-options" id="opts-mouth"></div></div>
      <div class="part-row"><div class="part-name">Arms</div><div class="part-options" id="opts-arms"></div></div>
      <div class="part-row"><div class="part-name">Wings</div><div class="part-options" id="opts-wings"></div></div>
      <div class="part-row"><div class="part-name">Tail</div><div class="part-options" id="opts-tail"></div></div>
      <div class="part-row"><div class="part-name">Marks</div><div class="part-options" id="opts-marks"></div></div>
    </div>
  </div>
</div>
<canvas id="cv-export" width="96" height="128" style="display:none;"></canvas>

<script>
// Walk cycle: 4 ticks. Each tick has explicit per-leg Y offsets.
// legL = left leg Y offset, legR = right leg Y offset
// tick0=idle, tick1=left fwd, tick2=idle, tick3=right fwd
const WALK_FRAMES = [
  {bob:0,  legL:0,  legR:0,  armL:0,  armR:0},   // idle
  {bob:-1, legL:-2, legR:2,  armL:1,  armR:-1},   // left leg fwd
  {bob:0,  legL:0,  legR:0,  armL:0,  armR:0},    // idle
  {bob:-1, legL:2,  legR:-2, armL:-1, armR:1},    // right leg fwd
];

const COLORS=[
  {n:'white', b:'#e0e0e0',s:'#909090',l:'#f8f8f8',d:'#606060',o:'#444'},
  {n:'sand',  b:'#d4a96a',s:'#7a4a18',l:'#f0cc98',d:'#5a3008',o:'#3a2000'},
  {n:'sky',   b:'#5ab0f0',s:'#0850a0',l:'#b0dcff',d:'#043070',o:'#022050'},
  {n:'teal',  b:'#30a890',s:'#005848',l:'#88dcd0',d:'#003830',o:'#002020'},
  {n:'lime',  b:'#88c030',s:'#386800',l:'#ccee80',d:'#204800',o:'#102800'},
  {n:'amber', b:'#f09820',s:'#803000',l:'#ffd880',d:'#501800',o:'#300800'},
  {n:'coral', b:'#e05050',s:'#800808',l:'#ff9898',d:'#500000',o:'#300000'},
  {n:'violet',b:'#9050c8',s:'#400878',l:'#d098f8',d:'#280048',o:'#180028'},
  {n:'rose',  b:'#d85090',s:'#700040',l:'#ff98c8',d:'#480028',o:'#280010'},
  {n:'stone', b:'#7088a0',s:'#283848',l:'#aac0d0',d:'#182430',o:'#0c1820'},
  {n:'black', b:'#383838',s:'#101010',l:'#606060',d:'#080808',o:'#000000'},
  {n:'gold',  b:'#e8b820',s:'#805000',l:'#fff080',d:'#503000',o:'#302000'},
];
const PARTS={body:8,hat:8,eyes:8,ears:8,mouth:7,arms:6,wings:6,tail:7,marks:6};
let sel={body:0,hat:0,eyes:1,ears:1,mouth:1,arms:1,wings:0,tail:0,marks:0,color:2};
let curDir='down';
let animPlaying=true,animTick=0,animInterval=null,animSpeed=200;

// =====================================================
// PIXEL HELPERS
// =====================================================
function px(ctx,x,y,c){ctx.fillStyle=c;ctx.fillRect(x,y,1,1);}
function row(ctx,x,y,w,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,1);}
function col(ctx,x,y,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,1,h);}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();ctx.fill();
}
function circ(ctx,cx,cy,r){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();}
function tri(ctx,x1,y1,x2,y2,x3,y3){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();ctx.fill();}

// Draw a body block with automatic 1px dark outline + 1px lighter top-left rim
function drawBlock(ctx, x,y,w,h,r, base,shade,lite,outline){
  // outline
  ctx.fillStyle=outline; rr(ctx,x-1,y-1,w+2,h+2,r+1);
  // shadow face (bottom+right)
  ctx.fillStyle=shade; rr(ctx,x,y,w,h,r);
  // base
  ctx.fillStyle=base; rr(ctx,x,y,w,h-2,r);
  // highlight rim (top-left 1px)
  ctx.fillStyle=lite;
  ctx.fillRect(x+r,y,w-r*2,1);
  ctx.fillRect(x,y+r,1,h-r*2-2);
}

// =====================================================
// MASTER DRAW
// =====================================================
function drawCreature(ctx, s, dir, wf){
  const C=COLORS[s.color];
  ctx.clearRect(0,0,32,32);
  const {bob,legL,legR,armL,armR} = WALK_FRAMES[wf];

  // ground shadow ellipse
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(16,31,5,1.5,0,0,Math.PI*2);ctx.fill();

  if(dir==='down')       drawFront(ctx,s,C,bob,legL,legR,armL,armR,false);
  else if(dir==='up')    drawFront(ctx,s,C,bob,legL,legR,armL,armR,true);
  else                   drawSide(ctx,s,dir,C,bob,legL,legR,armL,armR);
}

// =====================================================
// FRONT / BACK VIEW
// =====================================================
function drawFront(ctx,s,C,bob,legL,legR,armL,armR,isBack){
  const {b,s:sh,l,d,o}=C;

  // Wings behind everything
  if(!isBack) drawWingsFront(ctx,s,C,bob);

  // Back-arms (drawn before body)
  if(s.arms>0) drawArmFront(ctx,s,C,'left',bob,armL,true);
  if(s.arms>0) drawArmFront(ctx,s,C,'right',bob,armR,true);

  // Body + ears at same bob
  ctx.save(); ctx.translate(0,bob);
  drawBodyFront(ctx,s,C,isBack);
  drawEars(ctx,s,C,isBack?'back':'front');
  ctx.restore();

  // Front arms
  if(s.arms>0) drawArmFront(ctx,s,C,'left',bob,armL,false);
  if(s.arms>0) drawArmFront(ctx,s,C,'right',bob,armR,false);

  // Hat, face
  drawHat(ctx,s,C,'front',bob);
  if(!isBack){
    drawEyesFront(ctx,s,bob);
    drawMouthFront(ctx,s,bob);
    drawMarksFront(ctx,s,C,bob);
  }
  if(isBack && s.tail>0) drawTailBack(ctx,s,C,bob);

  // LEFT LEG
  drawLegFront(ctx,C,11,legL,'left',isBack);
  // RIGHT LEG
  drawLegFront(ctx,C,17,legR,'right',isBack);
}

function drawLegFront(ctx,C,lx,dy,side,isBack){
  const {b,s:sh,l,d,o}=C;
  const y=24+dy;
  // shin
  ctx.fillStyle=o; ctx.fillRect(lx,y,4,5);
  ctx.fillStyle=sh; ctx.fillRect(lx,y,4,4);
  ctx.fillStyle=b;  ctx.fillRect(lx,y,4,3);
  ctx.fillStyle=l;  px(ctx,lx,y,l);
  // foot: left side points left, right side points right
  const fx = side==='left' ? lx-2 : lx;
  ctx.fillStyle=o;  ctx.fillRect(fx,y+4,7,3);
  ctx.fillStyle=d;  ctx.fillRect(fx,y+4,7,2);
  ctx.fillStyle=sh; ctx.fillRect(fx+1,y+4,5,1);
  // toe highlight
  if(side==='left'){ctx.fillStyle=l;px(ctx,fx,y+4,l);}
  else{ctx.fillStyle=l;px(ctx,fx+6,y+4,l);}
}

// =====================================================
// SIDE VIEW
// =====================================================
function drawSide(ctx,s,dir,C,bob,legL,legR,armL,armR){
  const flip=dir==='right'; // facing right = mirrored
  const {b,s:sh,l,d,o}=C;

  // Wings
  drawWingsSide(ctx,s,C,dir,bob);

  // Back leg first (dimmer, behind body)
  // When facing LEFT: left leg is the "front" leg visually (near leg), right is back
  // When facing RIGHT: right leg is front, left is back
  const frontLegDy = flip ? legR : legL;
  const backLegDy  = flip ? legL : legR;

  drawLegSide(ctx,C,dir,backLegDy, true);   // back leg (dimmed)
  drawArmSide(ctx,s,C,dir,bob,flip?armR:armL,'back');
  
  ctx.save(); ctx.translate(0,bob);
  drawBodySide(ctx,s,dir,C);
  drawEars(ctx,s,C,dir);
  ctx.restore();

  drawArmSide(ctx,s,C,dir,bob,flip?armL:armR,'front');
  if(s.tail>0) drawTailSide(ctx,s,C,dir,bob);
  drawHat(ctx,s,C,dir,bob);
  drawEyeSide(ctx,s,dir,bob);
  drawMouthSide(ctx,s,dir,bob);
  drawMarksSide(ctx,s,C,dir,bob);

  drawLegSide(ctx,C,dir,frontLegDy, false);  // front leg (on top)
}

function drawLegSide(ctx,C,dir,dy,isBack){
  const flip=dir==='right';
  const {b,s:sh,l,d,o}=C;
  // leg x position: front leg slightly more towards face, back leg behind
  const lx = isBack ? (flip?15:13) : (flip?13:15);
  const y=24+dy;
  const alpha = isBack ? '88' : 'ff';

  // shin
  ctx.fillStyle=o+alpha; ctx.fillRect(lx,y,4,5);
  if(!isBack){
    ctx.fillStyle=sh; ctx.fillRect(lx,y,4,4);
    ctx.fillStyle=b;  ctx.fillRect(lx,y,4,3);
    ctx.fillStyle=l;  px(ctx,lx,y,l);
  } else {
    ctx.fillStyle=sh+'99'; ctx.fillRect(lx,y,4,4);
    ctx.fillStyle=b+'bb'; ctx.fillRect(lx,y,4,3);
  }

  // foot — always points in the walking direction
  // facing left: feet point left; facing right: feet point right
  ctx.fillStyle=o+(isBack?'88':'ff');
  if(!flip){
    // facing left: foot extends leftward
    ctx.fillRect(lx-3,y+4,7,3);
    if(!isBack){ctx.fillStyle=d;ctx.fillRect(lx-3,y+4,7,2);ctx.fillStyle=sh;ctx.fillRect(lx-2,y+4,5,1);ctx.fillStyle=l;px(ctx,lx-3,y+4,l);}
    else{ctx.fillStyle=d+'aa';ctx.fillRect(lx-3,y+4,7,2);}
  } else {
    // facing right: foot extends rightward
    ctx.fillRect(lx,y+4,7,3);
    if(!isBack){ctx.fillStyle=d;ctx.fillRect(lx,y+4,7,2);ctx.fillStyle=sh;ctx.fillRect(lx+1,y+4,5,1);ctx.fillStyle=l;px(ctx,lx+6,y+4,l);}
    else{ctx.fillStyle=d+'aa';ctx.fillRect(lx,y+4,7,2);}
  }
}

// =====================================================
// BODY SHAPES
// =====================================================
function drawBodyFront(ctx,s,C,isBack){
  const {b,s:sh,l,d,o}=C;
  const bodies=[
    // 0: round blob
    ()=>{
      ctx.fillStyle=o;circ(ctx,16,16,9);
      ctx.fillStyle=sh;circ(ctx,16,17,8);
      ctx.fillStyle=b;circ(ctx,16,16,8);
      ctx.fillStyle=l;circ(ctx,13,13,3);
      if(!isBack){ctx.fillStyle=l+'99';rr(ctx,11,11,5,4,2);}
    },
    // 1: boxy
    ()=>{
      ctx.fillStyle=o;ctx.fillRect(6,9,20,18);
      ctx.fillStyle=sh;ctx.fillRect(6,10,19,17);
      ctx.fillStyle=b;ctx.fillRect(7,10,18,16);
      ctx.fillStyle=l;ctx.fillRect(7,10,18,1);ctx.fillRect(7,10,1,16);
      if(!isBack){ctx.fillStyle=l+'88';ctx.fillRect(10,12,6,4);}
    },
    // 2: slim tall
    ()=>{
      ctx.fillStyle=o;rr(ctx,9,7,14,21,4);
      ctx.fillStyle=sh;rr(ctx,10,8,12,20,3);
      ctx.fillStyle=b;rr(ctx,10,8,12,19,3);
      ctx.fillStyle=l;row(ctx,11,8,10,l);col(ctx,10,9,17,l);
      if(!isBack){ctx.fillStyle=l+'88';rr(ctx,12,10,4,5,2);}
    },
    // 3: wide squat
    ()=>{
      ctx.fillStyle=o;rr(ctx,4,11,24,16,5);
      ctx.fillStyle=sh;rr(ctx,5,12,22,15,4);
      ctx.fillStyle=b;rr(ctx,5,12,22,14,4);
      ctx.fillStyle=l;row(ctx,7,12,18,l);col(ctx,5,13,12,l);
      if(!isBack){ctx.fillStyle=l+'88';rr(ctx,8,13,6,5,2);}
    },
    // 4: spiky
    ()=>{
      ctx.fillStyle=o;
      tri(ctx,11,20,8,11,14,11);tri(ctx,21,20,18,11,24,11);
      rr(ctx,8,13,16,14,3);
      ctx.fillStyle=sh;
      tri(ctx,11,19,9,12,13,12);tri(ctx,21,19,19,12,23,12);
      rr(ctx,9,14,14,13,3);
      ctx.fillStyle=b;
      tri(ctx,11,18,10,13,13,13);tri(ctx,21,18,20,13,23,13);
      rr(ctx,9,14,14,12,3);
      ctx.fillStyle=l;row(ctx,11,14,10,l);
      if(!isBack){ctx.fillStyle=l+'88';rr(ctx,12,15,4,4,1);}
    },
    // 5: pear
    ()=>{
      ctx.fillStyle=o;rr(ctx,6,11,20,17,5);
      ctx.fillStyle=sh;rr(ctx,7,16,18,12,4);ctx.fillStyle=sh;rr(ctx,9,11,14,13,4);
      ctx.fillStyle=b;rr(ctx,7,16,17,11,4);ctx.fillStyle=b;rr(ctx,9,11,14,12,4);
      ctx.fillStyle=l;row(ctx,11,11,10,l);col(ctx,9,12,10,l);
      if(!isBack){ctx.fillStyle=l+'88';rr(ctx,11,12,5,4,2);}
    },
    // 6: chibi big-head
    ()=>{
      ctx.fillStyle=o;circ(ctx,16,14,9);ctx.fillStyle=o;rr(ctx,9,20,14,8,3);
      ctx.fillStyle=sh;circ(ctx,16,15,8);rr(ctx,10,21,12,7,2);
      ctx.fillStyle=b;circ(ctx,16,14,8);rr(ctx,10,20,12,7,2);
      ctx.fillStyle=l;circ(ctx,13,11,3);
      if(!isBack){ctx.fillStyle=l+'88';rr(ctx,12,12,4,3,2);}
    },
    // 7: diamond
    ()=>{
      ctx.fillStyle=o;ctx.beginPath();ctx.moveTo(16,27);ctx.lineTo(6,19);ctx.lineTo(9,9);ctx.lineTo(23,9);ctx.lineTo(26,19);ctx.closePath();ctx.fill();
      ctx.fillStyle=sh;ctx.beginPath();ctx.moveTo(16,26);ctx.lineTo(7,19);ctx.lineTo(10,10);ctx.lineTo(22,10);ctx.lineTo(25,19);ctx.closePath();ctx.fill();
      ctx.fillStyle=b;ctx.beginPath();ctx.moveTo(16,24);ctx.lineTo(8,18);ctx.lineTo(10,10);ctx.lineTo(22,10);ctx.lineTo(24,18);ctx.closePath();ctx.fill();
      ctx.fillStyle=l;row(ctx,10,10,12,l);col(ctx,10,10,8,l);
      if(!isBack){ctx.fillStyle=l+'88';ctx.fillRect(13,12,4,4);}
    },
  ];
  bodies[s.body]?.();
}

function drawBodySide(ctx,s,dir,C){
  const flip=dir==='right';
  const {b,s:sh,l,d,o}=C;
  const ox=flip?2:0; // shift body slightly so face side has space
  const bodies=[
    ()=>{
      ctx.fillStyle=o;rr(ctx,7+ox,9,15,19,5);
      ctx.fillStyle=sh;rr(ctx,8+ox,10,13,18,4);
      ctx.fillStyle=b;rr(ctx,8+ox,10,13,17,4);
      ctx.fillStyle=l;row(ctx,9+ox,10,11,l);col(ctx,8+ox,11,15,l);
      ctx.fillStyle=l+'88';rr(ctx,flip?10+ox:9+ox,12,4,4,2);
    },
    ()=>{
      ctx.fillStyle=o;ctx.fillRect(7+ox,9,15,19);
      ctx.fillStyle=sh;ctx.fillRect(8+ox,10,13,18);
      ctx.fillStyle=b;ctx.fillRect(8+ox,10,13,17);
      ctx.fillStyle=l;row(ctx,8+ox,10,13,l);col(ctx,8+ox,10,17,l);
      ctx.fillStyle=l+'88';ctx.fillRect(flip?10+ox:9+ox,12,5,4);
    },
    ()=>{
      ctx.fillStyle=o;rr(ctx,8+ox,7,13,21,4);

function drawEars(ctx,s,C,dir){
  const e=s.ears;if(e===0)return;
  const {b,s:sh,l,o}=C;
  const side=dir==='left'||dir==='right';
  const flip=dir==='right';
  if(e===1){ // round cat
    if(side){const ex=flip?20:10;ctx.fillStyle=o;circ(ctx,ex,9,5);ctx.fillStyle=sh;circ(ctx,ex,9,4);ctx.fillStyle=b;circ(ctx,ex,9,4);ctx.fillStyle=l;px(ctx,ex-1,7,l);}
    else{[10,22].forEach(ex=>{ctx.fillStyle=o;circ(ctx,ex,9,5);ctx.fillStyle=sh;circ(ctx,ex,9,4);ctx.fillStyle=b;circ(ctx,ex,9,4);ctx.fillStyle=l;px(ctx,ex-1,7,l);});}
  }
  else if(e===2){ // pointy elf
    if(side){const ex=flip?21:10;ctx.fillStyle=o;tri(ctx,ex,13,ex-4,2,ex+4,2);ctx.fillStyle=sh;tri(ctx,ex,12,ex-3,3,ex+3,3);ctx.fillStyle=b;tri(ctx,ex,11,ex-2,4,ex+2,4);ctx.fillStyle=l;px(ctx,ex,4,l);}
    else{[{cx:10,sign:-1},{cx:22,sign:1}].forEach(({cx})=>{ctx.fillStyle=o;tri(ctx,cx,13,cx-4,2,cx+4,2);ctx.fillStyle=sh;tri(ctx,cx,12,cx-3,3,cx+3,3);ctx.fillStyle=b;tri(ctx,cx,11,cx-2,4,cx+2,4);ctx.fillStyle=l;px(ctx,cx,4,l);});}
  }
  else if(e===3){ // horns
    if(side){const hx=flip?20:11;ctx.fillStyle='#600000';tri(ctx,hx,12,hx-2,1,hx+3,1);ctx.fillStyle='#c62828';tri(ctx,hx,11,hx-1,2,hx+2,2);ctx.fillStyle='#ff6060';px(ctx,hx,3,l);}
    else{[{hx:11},{hx:21}].forEach(({hx})=>{ctx.fillStyle='#600000';tri(ctx,hx,12,hx-2,1,hx+3,1);ctx.fillStyle='#c62828';tri(ctx,hx,11,hx-1,2,hx+2,2);ctx.fillStyle='#ff6060';px(ctx,hx,3,'#ff8080');});}
  }
  else if(e===4){ // antenna
    const ax=side?(flip?19:13):16;
    ctx.fillStyle=o;ctx.fillRect(ax-1,0,3,12);ctx.fillStyle='#504000';ctx.fillRect(ax-1,0,3,11);ctx.fillStyle='#c0c000';ctx.fillRect(ax-1,0,3,10);ctx.fillStyle='#ffff40';ctx.fillRect(ax,0,1,9);
    ctx.fillStyle=o;circ(ctx,ax,0,3);ctx.fillStyle='#ffcc00';circ(ctx,ax,0,2);ctx.fillStyle='#ffff80';px(ctx,ax-1,-1,'#ffff80');
    if(!side){const ax2=10;ctx.fillStyle=o;ctx.fillRect(ax2-1,2,3,10);ctx.fillStyle='#c0c000';ctx.fillRect(ax2-1,2,3,9);ctx.fillStyle=o;circ(ctx,ax2,2,3);ctx.fillStyle='#ffcc00';circ(ctx,ax2,2,2);}
  }
  else if(e===5){ // floppy
    if(side){
      const ex=flip?18:6;const ew=flip?-5:5;
      ctx.fillStyle=o;rr(ctx,Math.min(ex,ex+ew)-1,8,8,15,3);
      ctx.fillStyle=sh;rr(ctx,Math.min(ex,ex+ew),9,6,14,2);
      ctx.fillStyle=b;rr(ctx,Math.min(ex,ex+ew),9,6,13,2);
      ctx.fillStyle=sh+'88';col(ctx,Math.min(ex,ex+ew)+1,10,11,sh+'88');
    } else {
      [[4,13],[21,13]].forEach(([x,w])=>{
        ctx.fillStyle=o;rr(ctx,x-1,8,w+2,15,3);
        ctx.fillStyle=sh;rr(ctx,x,9,w,14,2);
        ctx.fillStyle=b;rr(ctx,x,9,w,13,2);
        ctx.fillStyle=sh+'88';col(ctx,x+1,10,11,sh+'88');
      });
    }
  }
  else if(e===6){ // fin / wing ears
    if(side){const fx=flip?22:8;ctx.fillStyle=o;tri(ctx,flip?fx:fx+2,14,flip?fx+9:fx-7,1,flip?fx+4:fx+5,8);ctx.fillStyle=sh;tri(ctx,flip?fx:fx+2,14,flip?fx+7:fx-5,2,flip?fx+3:fx+4,9);ctx.fillStyle=b;tri(ctx,flip?fx:fx+2,13,flip?fx+6:fx-4,3,flip?fx+3:fx+4,9);ctx.fillStyle=l;px(ctx,flip?fx+4:fx,8,l);}
    else{ctx.fillStyle=o;tri(ctx,10,14,1,1,13,7);tri(ctx,22,14,31,1,19,7);ctx.fillStyle=sh;tri(ctx,10,13,2,2,12,8);tri(ctx,22,13,30,2,20,8);ctx.fillStyle=b;tri(ctx,10,12,3,3,12,8);tri(ctx,22,12,29,3,20,8);ctx.fillStyle=l;px(ctx,4,4,l);px(ctx,28,4,l);}
  }
  else if(e===7){ // bear round ears
    if(side){const ex=flip?20:10;ctx.fillStyle=o;circ(ctx,ex,8,6);ctx.fillStyle=sh;circ(ctx,ex,8,5);ctx.fillStyle=b;circ(ctx,ex,8,5);ctx.fillStyle='#c06040';circ(ctx,ex,8,3);ctx.fillStyle='#e08060';circ(ctx,ex,8,2);}
    else{[10,22].forEach(ex=>{ctx.fillStyle=o;circ(ctx,ex,8,6);ctx.fillStyle=sh;circ(ctx,ex,8,5);ctx.fillStyle=b;circ(ctx,ex,8,5);ctx.fillStyle='#c06040';circ(ctx,ex,8,3);ctx.fillStyle='#e08060';circ(ctx,ex,8,2);});}
  }
}

// =====================================================
// EYES
// =====================================================
function drawEyeAt(ctx,e,x,y){
  const shine=()=>{ctx.fillStyle='#fff';px(ctx,x,y,'#fff');}
  if(e===0){ctx.fillStyle='#222';ctx.fillRect(x,y,2,2);ctx.fillStyle='#fff';px(ctx,x+1,y,'#fff');}
  else if(e===1){ // large round
    ctx.fillStyle='#000';rr(ctx,x-1,y-1,4,4,1);
    ctx.fillStyle='#fff';rr(ctx,x-1,y-1,4,3,1);
    ctx.fillStyle='#1a237e';ctx.fillRect(x,y,2,2);
    ctx.fillStyle='#6090ff';ctx.fillRect(x,y,1,1);
    ctx.fillStyle='#fff';px(ctx,x+1,y+1,'#fff');
  }
  else if(e===2){ // sleepy
    ctx.fillStyle='#555';ctx.fillRect(x,y,2,1);
    ctx.fillStyle='#222';ctx.fillRect(x,y+1,2,1);
    ctx.fillStyle='#888';px(ctx,x,y,'#888');
  }
  else if(e===3){ // demon
    ctx.fillStyle='#800';rr(ctx,x-1,y-1,4,4,1);
    ctx.fillStyle='#300';ctx.fillRect(x,y,2,2);
    ctx.fillStyle='#f00';px(ctx,x+1,y,'#f00');
    ctx.fillStyle='#ff8';px(ctx,x,y,'#ff8');
  }
  else if(e===4){ // star
    ctx.fillStyle='#cc9900';
    ctx.fillRect(x,y-1,2,1);ctx.fillRect(x-1,y,1,2);ctx.fillRect(x,y,2,2);ctx.fillRect(x+2,y,1,2);ctx.fillRect(x,y+2,2,1);
    ctx.fillStyle='#ffee44';ctx.fillRect(x,y,2,2);
    ctx.fillStyle='#fff8';px(ctx,x,y,'#fff8');
  }
  else if(e===5){ // oval tall
    ctx.fillStyle='#000';ctx.fillRect(x,y-1,2,4);
    ctx.fillStyle='#222';ctx.fillRect(x,y,2,2);
    ctx.fillStyle='#fff';px(ctx,x+1,y,'#fff');ctx.fillStyle='#666';px(ctx,x,y+2,'#666');
  }
  else if(e===6){ // teal alien
    ctx.fillStyle='#003';rr(ctx,x-1,y-1,4,4,1);
    ctx.fillStyle='#006040';ctx.fillRect(x,y,2,2);
    ctx.fillStyle='#00e0a0';px(ctx,x,y,'#00e0a0');
    ctx.fillStyle='#80ffe0';px(ctx,x+1,y,'#80ffe0');
  }
  else if(e===7){ // happy ^ ^
    ctx.fillStyle='#222';ctx.fillRect(x,y+1,2,1);ctx.fillRect(x,y,1,1);ctx.fillRect(x+1,y,1,1);
    ctx.fillStyle='#555';px(ctx,x,y,'#555');
  }
}
function drawEyesFront(ctx,s,bob){[[11,15],[19,15]].forEach(([x,y])=>drawEyeAt(ctx,s.eyes,x,y+bob));}
function drawEyeSide(ctx,s,dir,bob){
  const x=dir==='left'?11:18;
  drawEyeAt(ctx,s.eyes,x,15+bob);
}

function drawMouthAt(ctx,m,x,y){
  if(m===0){ctx.fillStyle='#333';ctx.fillRect(x,y,4,1);ctx.fillStyle='#111';px(ctx,x,y,'#111');px(ctx,x+3,y,'#111');}
  else if(m===1){ // smile
    ctx.fillStyle='#333';ctx.fillRect(x,y,4,1);ctx.fillRect(x,y+1,2,1);
    ctx.fillStyle='#555';px(ctx,x+3,y,'#555');px(ctx,x,y,'#555');
  }
  else if(m===2){ // frown
    ctx.fillStyle='#333';ctx.fillRect(x+1,y,2,1);ctx.fillRect(x,y+1,4,1);
    ctx.fillStyle='#555';px(ctx,x,y+1,'#555');px(ctx,x+3,y+1,'#555');
  }
  else if(m===3){ // fangs
    ctx.fillStyle='#900';ctx.fillRect(x,y,4,2);
    ctx.fillStyle='#c00';ctx.fillRect(x,y,4,1);
    ctx.fillStyle='#fff';ctx.fillRect(x+1,y,1,2);ctx.fillRect(x+2,y,1,2);
    ctx.fillStyle='#ffd';px(ctx,x+1,y,'#ffd');px(ctx,x+2,y,'#ffd');
  }
  else if(m===4){ // roar
    ctx.fillStyle='#700';ctx.fillRect(x-1,y-1,6,4);
    ctx.fillStyle='#c00';ctx.fillRect(x-1,y-1,6,3);
    ctx.fillStyle='#500';ctx.fillRect(x-1,y+2,6,1);
    ctx.fillStyle='#fff';ctx.fillRect(x,y-1,1,3);ctx.fillRect(x+2,y-1,1,3);ctx.fillRect(x+4,y-1,1,3);
    ctx.fillStyle='#ffd';px(ctx,x,y-1,'#ffd');px(ctx,x+2,y-1,'#ffd');px(ctx,x+4,y-1,'#ffd');
    ctx.fillStyle='#ff8080';ctx.fillRect(x+1,y,1,2);ctx.fillRect(x+3,y,1,2);
  }
  else if(m===5){ // beak
    ctx.fillStyle='#806000';ctx.fillRect(x,y,4,2);
    ctx.fillStyle='#c09000';ctx.fillRect(x,y,4,1);
    ctx.fillStyle='#ffd060';px(ctx,x,y,'#ffd060');
    ctx.fillStyle='#403000';ctx.fillRect(x,y+1,4,1);
  }
  else if(m===6){ // tongue
    ctx.fillStyle='#333';ctx.fillRect(x,y,4,1);
    ctx.fillStyle='#d04060';ctx.fillRect(x+1,y+1,2,2);
    ctx.fillStyle='#f06080';px(ctx,x+1,y+1,'#f06080');
    ctx.fillStyle='#c03050';ctx.fillRect(x+1,y+2,2,1);
    ctx.fillStyle='#800';px(ctx,x+2,y+2,'#800');
  }
}
function drawMouthFront(ctx,s,bob){drawMouthAt(ctx,s.mouth,14,20+bob);}
function drawMouthSide(ctx,s,dir,bob){drawMouthAt(ctx,s.mouth,dir==='left'?10:17,20+bob);}

// =====================================================
// ARMS
// =====================================================
function drawArmFront(ctx,s,C,side,bob,armDy,isBehind){
  const a=s.arms;if(a===0)return;
  const {b,s:sh,l,o}=C;
  const ax=side==='left'?5:24;
  const y=14+bob+armDy;
  if(isBehind){
    // draw darker 'back' arm (no outline needed, just darker)
    ctx.fillStyle=sh+'66';
    if(a===1)ctx.fillRect(ax,y,3,6);
    else if(a===2)rr(ctx,ax,y,3,7,1);
    else if(a===3)ctx.fillRect(ax,y,4,6);
    else if(a===4)circ(ctx,ax+1,y+2,4);
    else if(a===5)ctx.fillRect(ax,y,3,4);
    return;
  }
  // front arm with outline+shading
  if(a===1){ ctx.fillStyle=o;ctx.fillRect(ax-1,y-1,5,8);ctx.fillStyle=sh;ctx.fillRect(ax,y,3,7);ctx.fillStyle=b;ctx.fillRect(ax,y,3,6);ctx.fillStyle=l;px(ctx,ax,y,l);}
  else if(a===2){ ctx.fillStyle=o;rr(ctx,ax-1,y-1,5,10,2);ctx.fillStyle=sh;rr(ctx,ax,y,3,9,1);ctx.fillStyle=b;rr(ctx,ax,y,3,8,1);ctx.fillStyle=sh;ctx.fillRect(ax,y+6,3,2);ctx.fillStyle=l;px(ctx,ax,y,l);}
  else if(a===3){ ctx.fillStyle=o;ctx.fillRect(ax-1,y-1,6,8);ctx.fillStyle=sh;ctx.fillRect(ax,y,4,7);ctx.fillStyle=b;ctx.fillRect(ax,y,4,6);ctx.fillStyle=o;tri(ctx,ax,y,ax+4,y,ax+2,y-3);ctx.fillStyle=sh;tri(ctx,ax+1,y,ax+3,y,ax+2,y-2);ctx.fillStyle=l;px(ctx,ax,y,l);}
  else if(a===4){ ctx.fillStyle=o;circ(ctx,ax+1,y+2,5);ctx.fillStyle=sh;circ(ctx,ax+1,y+2,4);ctx.fillStyle=b;circ(ctx,ax+1,y+1,4);ctx.fillStyle=l;px(ctx,ax,y,l);}
  else if(a===5){ ctx.fillStyle=o;ctx.fillRect(ax-1,y-1,5,6);ctx.fillStyle=sh;ctx.fillRect(ax,y,3,5);ctx.fillStyle=b;ctx.fillRect(ax,y,3,4);ctx.fillStyle=l;px(ctx,ax,y,l);}
}
function drawArmSide(ctx,s,C,dir,bob,armDy,which){
  const a=s.arms;if(a===0)return;
  const flip=dir==='right';
  const {b,s:sh,l,o}=C;
  // front arm = face-facing side; back arm = other side
  const ax = which==='front' ? (flip?22:6) : (flip?18:10);
  const y=14+bob+armDy;
  const isBehind=which==='back';
  if(isBehind){
    ctx.fillStyle=sh+'77';
    if(a===1)ctx.fillRect(ax,y,3,6);
    else if(a===2)rr(ctx,ax,y,3,7,1);
    else if(a===3)ctx.fillRect(ax,y,3,6);
    else if(a===4)circ(ctx,ax+1,y+2,4);
    else if(a===5)ctx.fillRect(ax,y,3,4);
    return;
  }
  if(a===1){ctx.fillStyle=o;ctx.fillRect(ax-1,y-1,5,8);ctx.fillStyle=sh;ctx.fillRect(ax,y,3,7);ctx.fillStyle=b;ctx.fillRect(ax,y,3,6);ctx.fillStyle=l;px(ctx,ax,y,l);}
  else if(a===2){ctx.fillStyle=o;rr(ctx,ax-1,y-1,5,10,2);ctx.fillStyle=sh;rr(ctx,ax,y,3,9,1);ctx.fillStyle=b;rr(ctx,ax,y,3,8,1);ctx.fillStyle=sh;ctx.fillRect(ax,y+6,3,2);ctx.fillStyle=l;px(ctx,ax,y,l);}
  else if(a===3){ctx.fillStyle=o;ctx.fillRect(ax-1,y-1,5,8);ctx.fillStyle=sh;ctx.fillRect(ax,y,3,7);ctx.fillStyle=b;ctx.fillRect(ax,y,3,6);ctx.fillStyle=o;tri(ctx,ax,y,ax+4,y,ax+2,y-3);ctx.fillStyle=l;px(ctx,ax,y,l);}
  else if(a===4){ctx.fillStyle=o;circ(ctx,ax+1,y+2,5);ctx.fillStyle=sh;circ(ctx,ax+1,y+2,4);ctx.fillStyle=b;circ(ctx,ax+1,y+1,4);ctx.fillStyle=l;px(ctx,ax,y,l);}
  else if(a===5){ctx.fillStyle=o;ctx.fillRect(ax-1,y-1,5,6);ctx.fillStyle=sh;ctx.fillRect(ax,y,3,5);ctx.fillStyle=b;ctx.fillRect(ax,y,3,4);ctx.fillStyle=l;px(ctx,ax,y,l);}
}

// =====================================================
// HATS
// =====================================================
function drawHat(ctx,s,C,dir,bob){
  const h=s.hat;if(h===0)return;
  const side=dir==='left'||dir==='right';
  const flip=dir==='right';
  const y=bob;
  const cx=side?(flip?17:14):16;
  if(h===1){ // flat cap
    ctx.fillStyle='#1a0800';ctx.fillRect(cx-7,7+y,14,3);
    ctx.fillStyle='#3a1800';ctx.fillRect(cx-5,3+y,10,5);
    ctx.fillStyle='#5a2800';ctx.fillRect(cx-5,3+y,10,4);
    ctx.fillStyle='#7a4010';ctx.fillRect(cx-4,3+y,9,3);
    ctx.fillStyle='#9a5820';px(ctx,cx-3,3+y,'#9a5820');
    ctx.fillStyle='#c8a060';ctx.fillRect(cx-4,6+y,9,1); // band
  }
  else if(h===2){ // witch
    ctx.fillStyle='#0a0018';ctx.fillRect(cx-8,8+y,16,3);
    ctx.fillStyle='#180030';ctx.fillRect(cx-7,8+y,14,2);
    ctx.fillStyle='#0a0018';tri(ctx,cx,0+y,cx-6,9+y,cx+6,9+y);
    ctx.fillStyle='#2a0060';tri(ctx,cx,1+y,cx-5,9+y,cx+5,9+y);
    ctx.fillStyle='#4a00a0';tri(ctx,cx,2+y,cx-4,9+y,cx+4,9+y);
    ctx.fillStyle='#c0a000';ctx.fillRect(cx-3,6+y,6,1);
    ctx.fillStyle='#ffe000';ctx.fillRect(cx-2,6+y,4,1);
    ctx.fillStyle='#fff080';ctx.fillRect(cx-1,6+y,2,1);
  }
  else if(h===3){ // crown
    ctx.fillStyle='#603000';ctx.fillRect(cx-7,7+y,14,6);
    ctx.fillStyle='#b07000';ctx.fillRect(cx-6,8+y,12,5);
    ctx.fillStyle='#e0a000';ctx.fillRect(cx-6,8+y,12,4);
    ctx.fillStyle='#ffc000';ctx.fillRect(cx-5,8+y,10,3);
    // spikes
    [[cx-5,7],[cx,6],[cx+4,7]].forEach(([sx,sy])=>{
      ctx.fillStyle='#804000';tri(ctx,sx,7+y,sx-1,sy-1+y,sx+2,sy-1+y);
      ctx.fillStyle='#e0a000';tri(ctx,sx,7+y,sx,sy+y,sx+1,sy+y);
    });
    // gems
    ctx.fillStyle='#ff2020';ctx.fillRect(cx-4,9+y,2,2);
    ctx.fillStyle='#2020ff';ctx.fillRect(cx,9+y,2,2);
    ctx.fillStyle='#20c040';ctx.fillRect(cx+3,9+y,2,2);
    ctx.fillStyle='#fff8';px(ctx,cx-4,9+y,'#fff8');px(ctx,cx,9+y,'#fff8');px(ctx,cx+3,9+y,'#fff8');
  }
  else if(h===4){ // beanie
    ctx.fillStyle='#800000';rr(ctx,cx-7,4+y,14,8,3);
    ctx.fillStyle='#c02020';rr(ctx,cx-6,5+y,12,7,2);
    ctx.fillStyle='#e04040';rr(ctx,cx-6,5+y,12,6,2);
    // stripes
    ctx.fillStyle='#fff8';ctx.fillRect(cx-5,7+y,10,1);
    ctx.fillStyle='#c020208';ctx.fillRect(cx-5,9+y,10,1);
    // pompom
    ctx.fillStyle='#fff';circ(ctx,cx,4+y,3);

// =====================================================
// FRAME + RENDER
// =====================================================
function makeFrame(s,dir,wf){
  const c=document.createElement('canvas');c.width=32;c.height=32;
  const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=false;
  drawCreature(ctx,s,dir,wf);
  return c;
}
function renderBig(){
  const cv=document.getElementById('cv-big');
  const ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,192,192);
  ctx.drawImage(makeFrame(sel,curDir,animTick),0,0,192,192);
}
function renderSheet(){
  const sheet=document.getElementById('cv-export');
  const ctx=sheet.getContext('2d');ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,96,128);
  ['down','left','right','up'].forEach((dir,row)=>{
    [0,1,2,3].forEach((wf,col)=>{
      if(col<3) ctx.drawImage(makeFrame(sel,dir,wf),col*32,row*32);
    });
  });
}
function renderAll(){renderBig();renderSheet();}

// =====================================================
// ANIMATION — advance through all 4 WALK_FRAMES ticks
// =====================================================
function tick(){
  animTick=(animTick+1)%WALK_FRAMES.length;
  renderBig();
}
function startAnim(){if(animInterval)clearInterval(animInterval);animInterval=setInterval(tick,animSpeed);}
function toggleAnim(){animPlaying=!animPlaying;document.getElementById('anim-btn').textContent=animPlaying?'⏸':'▶';if(animPlaying)startAnim();else clearInterval(animInterval);}
function updateSpeed(v){animSpeed=parseInt(v);document.getElementById('speed-val').textContent=v;if(animPlaying)startAnim();}
function setDir(d){curDir=d;renderBig();}
function downloadSheet(){
  renderSheet();
  document.getElementById('cv-export').toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='creature_96x128.png';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  },'image/png');
}
function randomize(){
  Object.keys(PARTS).forEach(p=>sel[p]=Math.floor(Math.random()*PARTS[p]));
  sel.color=Math.floor(Math.random()*COLORS.length);
  updateUI();renderAll();
}

// =====================================================
// UI
// =====================================================
function updateUI(){
  document.querySelectorAll('#opts-body .sil-btn').forEach((btn,i)=>btn.classList.toggle('selected',i===sel.body));
  ['hat','eyes','ears','mouth','arms','wings','tail','marks'].forEach(part=>{
    document.querySelectorAll(`#opts-${part} .part-btn`).forEach((btn,i)=>btn.classList.toggle('selected',i===sel[part]));
  });
  document.querySelectorAll('.color-swatch').forEach((sw,i)=>sw.classList.toggle('selected',i===sel.color));
  refreshMinis();
}
function refreshMinis(){
  ['hat','eyes','ears','mouth','arms','wings','tail','marks'].forEach(part=>{
    document.querySelectorAll(`#opts-${part} .part-btn`).forEach((btn,i)=>{
      const mc=btn.querySelector('canvas');if(!mc)return;
      const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
      drawCreature(mctx,{...sel,[part]:i},'down',0);
    });
  });
  document.querySelectorAll('#opts-body .sil-btn').forEach((btn,i)=>{
    const mc=btn.querySelector('canvas');if(!mc)return;
    const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
    drawCreature(mctx,{...sel,body:i},'down',0);
  });
}
function buildColors(){
  const row=document.getElementById('color-row');
  COLORS.forEach((c,i)=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(i===sel.color?' selected':'');
    sw.style.background=c.b;sw.title=c.n;
    sw.onclick=()=>{sel.color=i;updateUI();renderAll();};
    row.appendChild(sw);
  });
}
function buildBody(){
  const container=document.getElementById('opts-body');
  for(let i=0;i<PARTS.body;i++){
    const btn=document.createElement('button');
    btn.className='sil-btn'+(i===sel.body?' selected':'');
    const mc=document.createElement('canvas');mc.width=32;mc.height=40;
    mc.style.cssText='width:30px;height:38px;display:block;image-rendering:pixelated;';
    const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
    drawCreature(mctx,{...sel,body:i},'down',0);
    btn.appendChild(mc);btn.onclick=()=>{sel.body=i;updateUI();renderAll();};
    container.appendChild(btn);
  }
}
function buildParts(part,count){
  const container=document.getElementById('opts-'+part);
  const hasNone=part==='hat'||part==='tail'||part==='arms'||part==='wings'||part==='marks';
  for(let i=0;i<count;i++){
    const btn=document.createElement('button');
    btn.className='part-btn'+(i===sel[part]?' selected':'');
    if(i===0&&hasNone){
      btn.innerHTML='<span style="font-size:15px;color:#9090c0;line-height:34px;">✕</span>';
    } else {
      const mc=document.createElement('canvas');mc.width=32;mc.height=32;
      mc.style.cssText='width:32px;height:32px;display:block;image-rendering:pixelated;';
      const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
      drawCreature(mctx,{...sel,[part]:i},'down',0);
      btn.appendChild(mc);
    }
    btn.onclick=()=>{sel[part]=i;updateUI();renderAll();};
    container.appendChild(btn);
  }
}

buildColors();
buildBody();
['hat','eyes','ears','mouth','arms','wings','tail','marks'].forEach(p=>buildParts(p,PARTS[p]));
renderAll();
startAnim();
</script>
</body></html>
