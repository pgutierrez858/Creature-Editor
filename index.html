<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:monospace;background:#c8ccd8;color:#2a2a4a;user-select:none;}
.checker-area{
  background-color:#aaaaaa;
  background-image:linear-gradient(45deg,#999 25%,transparent 25%),linear-gradient(-45deg,#999 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#999 75%),linear-gradient(-45deg,transparent 75%,#999 75%);
  background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;
  width:100%;height:220px;display:flex;align-items:center;justify-content:center;
}
.controls-bar{background:#9aa2b8;border-radius:12px 12px 0 0;padding:8px 10px 10px;}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.silhouettes{display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;}
.color-swatches{display:flex;gap:3px;align-items:center;}
.color-swatch{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;}
.color-swatch.selected{border-color:#fff;}
.bottom-row{display:flex;gap:10px;align-items:flex-start;}
.dpad-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.dpad-wrap{position:relative;width:88px;height:88px;flex-shrink:0;}
.dpad-bg{width:88px;height:88px;border-radius:50%;background:linear-gradient(145deg,#6a60d0,#3d3490);box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2);}
.dpad-btn{position:absolute;width:26px;height:26px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.85);border-radius:4px;}
.dpad-btn:hover{color:#fff;background:rgba(255,255,255,.15);}
.dpad-center{top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;}
.dpad-up{top:3px;left:50%;transform:translateX(-50%);}
.dpad-down{bottom:3px;left:50%;transform:translateX(-50%);}
.dpad-left{left:3px;top:50%;transform:translateY(-50%);}
.dpad-right{right:3px;top:50%;transform:translateY(-50%);}
.parts-area{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:4px;}
.part-row{display:flex;align-items:center;gap:4px;}
.part-name{font-size:8px;color:#7070a0;width:34px;text-align:right;flex-shrink:0;letter-spacing:.05em;text-transform:uppercase;}
.part-options{display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
.part-options::-webkit-scrollbar{height:3px;}
.part-options::-webkit-scrollbar-thumb{background:#6a72a0;border-radius:2px;}
.part-btn{width:38px;height:38px;border-radius:7px;border:1.5px solid #7a82a8;background:#8a92b0;cursor:pointer;padding:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.part-btn:hover{border-color:#b0b8d0;background:#9aa2c0;}
.part-btn.selected{border:2px solid #fff;background:#534AB7;box-shadow:0 0 8px rgba(83,74,183,.6);}
.part-btn canvas{display:block;image-rendering:pixelated;}
.sil-btn{width:38px;height:46px;border-radius:7px;border:1.5px solid #7a82a8;background:#8a92b0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.sil-btn:hover{border-color:#b0b8d0;background:#9aa2c0;}
.sil-btn.selected{border:2px solid #fff;background:#534AB7;box-shadow:0 0 8px rgba(83,74,183,.6);}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
.speed-row{display:flex;align-items:center;gap:5px;}
.speed-row label{font-size:8px;color:#7070a0;}
.speed-row input{width:60px;accent-color:#534AB7;}
.speed-val{font-size:8px;color:#c5c8e0;min-width:24px;}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:5px;cursor:pointer;border:none;background:#534AB7;color:#fff;font-family:monospace;font-weight:600;}
.btn-sm:hover{background:#3C3489;}
.btn-rand{background:#6a72a0;}.btn-rand:hover{background:#5a6290;}
</style></head>
<body>
<div class="checker-area">
  <canvas id="cv-big" width="192" height="192" style="width:192px;height:192px;"></canvas>
</div>
<div class="controls-bar">
  <div class="top-row">
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="silhouettes" id="opts-body"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="display:flex;gap:4px;">
        <button class="btn-sm btn-rand" onclick="randomize()">⚄ Random</button>
        <button class="btn-sm" onclick="downloadSheet()">↓ Export</button>
      </div>
      <div class="color-swatches" id="color-row"></div>
    </div>
  </div>
  <div class="bottom-row">
    <div class="dpad-col">
      <div class="dpad-wrap">
        <div class="dpad-bg"></div>
        <button class="dpad-btn dpad-up" onclick="setDir('up')">▲</button>
        <button class="dpad-btn dpad-down" onclick="setDir('down')">▼</button>
        <button class="dpad-btn dpad-left" onclick="setDir('left')">◀</button>
        <button class="dpad-btn dpad-right" onclick="setDir('right')">▶</button>
        <button class="dpad-btn dpad-center" onclick="toggleAnim()" id="anim-btn">⏸</button>
      </div>
      <div class="speed-row">
        <label>SPD</label>
        <input type="range" min="60" max="500" value="200" step="20" oninput="updateSpeed(this.value)">
        <span class="speed-val" id="speed-val">200</span>
      </div>
    </div>
    <div class="parts-area">
      <div class="part-row"><div class="part-name">Hat</div><div class="part-options" id="opts-hat"></div></div>
      <div class="part-row"><div class="part-name">Eyes</div><div class="part-options" id="opts-eyes"></div></div>
      <div class="part-row"><div class="part-name">Ears</div><div class="part-options" id="opts-ears"></div></div>
      <div class="part-row"><div class="part-name">Mouth</div><div class="part-options" id="opts-mouth"></div></div>
      <div class="part-row"><div class="part-name">Arms</div><div class="part-options" id="opts-arms"></div></div>
      <div class="part-row"><div class="part-name">Wings</div><div class="part-options" id="opts-wings"></div></div>
      <div class="part-row"><div class="part-name">Tail</div><div class="part-options" id="opts-tail"></div></div>
      <div class="part-row"><div class="part-name">Marks</div><div class="part-options" id="opts-marks"></div></div>
    </div>
  </div>
</div>
<canvas id="cv-export" width="96" height="128" style="display:none;"></canvas>

<script>
const COLORS=[
  {n:'white', b:'#e8e8e8',s:'#aaaaaa',l:'#ffffff',d:'#888'},
  {n:'sand',  b:'#d4a96a',s:'#8a5a24',l:'#f5d8a8',d:'#6a3a10'},
  {n:'sky',   b:'#5ab0f0',s:'#1060b0',l:'#c0e0ff',d:'#08408a'},
  {n:'teal',  b:'#38b0a0',s:'#006050',l:'#a0e8d8',d:'#004038'},
  {n:'lime',  b:'#90c840',s:'#407010',l:'#d0f080',d:'#284800'},
  {n:'amber', b:'#f0a030',s:'#904000',l:'#ffe090',d:'#602000'},
  {n:'coral', b:'#e06060',s:'#901010',l:'#ffa0a0',d:'#600000'},
  {n:'violet',b:'#a060d0',s:'#501090',l:'#d8a8f8',d:'#300060'},
  {n:'rose',  b:'#e060a0',s:'#800050',l:'#ffa8d0',d:'#500030'},
  {n:'stone', b:'#7890a0',s:'#304050',l:'#b8ccd8',d:'#182830'},
  {n:'black', b:'#404040',s:'#181818',l:'#686868',d:'#080808'},
  {n:'gold',  b:'#f0c030',s:'#906000',l:'#fff0a0',d:'#604000'},
];
const PARTS={body:8,hat:8,eyes:8,ears:7,mouth:7,arms:6,wings:6,tail:7,marks:6};
let sel={body:0,hat:0,eyes:1,ears:1,mouth:1,arms:1,wings:0,tail:0,marks:0,color:2};
let curDir='down';
let animPlaying=true,animFrame=0,animInterval=null,animSpeed=200;
const WALK=[0,1,0,2];

// ---- primitives ----
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();c.fill();}
function circ(c,cx,cy,r){c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fill();}
function tri(c,x1,y1,x2,y2,x3,y3){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.lineTo(x3,y3);c.closePath();c.fill();}

// =====================================================
// MASTER DRAW — transparent bg
// =====================================================
function drawCreature(ctx,s,dir,frame){
  const C=COLORS[s.color];
  ctx.clearRect(0,0,32,32); // TRANSPARENT background

  const bob=frame===0?0:frame===1?-1:1;
  const flegOff=frame===1?2:frame===2?-1:0;
  const blegOff=frame===1?-1:frame===2?2:0;

  // ground shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();ctx.ellipse(16,31,5,1.5,0,0,Math.PI*2);ctx.fill();

  if(dir==='down')  drawFront(ctx,s,C,bob,flegOff,blegOff);
  else if(dir==='up') drawBack(ctx,s,C,bob,flegOff,blegOff);
  else              drawSide(ctx,s,dir,C,bob,flegOff,blegOff);
}

// =====================================================
// BODY SHAPES — returns {top,bot,lx,rx,w} for layout
// =====================================================
const BODY_BOUNDS=[
  {top:10,bot:28,lx:8, rx:24,w:16},  // 0 round
  {top:10,bot:28,lx:7, rx:25,w:18},  // 1 boxy
  {top:8, bot:28,lx:10,rx:22,w:12},  // 2 slim
  {top:12,bot:28,lx:5, rx:27,w:22},  // 3 wide
  {top:12,bot:28,lx:9, rx:23,w:14},  // 4 spiky
  {top:10,bot:28,lx:7, rx:25,w:18},  // 5 pear
  {top:11,bot:28,lx:8, rx:24,w:16},  // 6 chibi
  {top:10,bot:28,lx:8, rx:24,w:16},  // 7 diamond
];

function drawBodyFront(ctx,s,C,isBack){
  const {b,s:sh,l}=C;
  const bodies=[
    ()=>{ctx.fillStyle=sh;rr(ctx,9,19,14,10,3);ctx.fillStyle=b;rr(ctx,8,10,16,16,6);if(!isBack){ctx.fillStyle=l;rr(ctx,11,12,5,4,2);}},
    ()=>{ctx.fillStyle=sh;ctx.fillRect(8,20,16,8);ctx.fillStyle=b;ctx.fillRect(7,10,18,16);if(!isBack){ctx.fillStyle=l;ctx.fillRect(10,12,6,4);}},
    ()=>{ctx.fillStyle=sh;rr(ctx,11,21,10,7,2);ctx.fillStyle=b;rr(ctx,10,8,12,18,4);if(!isBack){ctx.fillStyle=l;rr(ctx,12,10,4,5,2);}},
    ()=>{ctx.fillStyle=sh;rr(ctx,5,21,22,7,3);ctx.fillStyle=b;rr(ctx,5,12,22,14,5);if(!isBack){ctx.fillStyle=l;rr(ctx,8,13,6,5,2);}},
    ()=>{ctx.fillStyle=sh;tri(ctx,12,20,10,12,14,12);tri(ctx,20,20,18,12,22,12);ctx.fillStyle=b;rr(ctx,9,14,14,13,3);if(!isBack){ctx.fillStyle=l;rr(ctx,12,15,4,4,1);}},
    ()=>{ctx.fillStyle=sh;rr(ctx,7,19,18,10,4);ctx.fillStyle=b;rr(ctx,8,10,16,16,5);ctx.fillStyle=b;rr(ctx,6,17,20,9,4);if(!isBack){ctx.fillStyle=l;rr(ctx,11,12,5,4,2);}},
    ()=>{ctx.fillStyle=sh;rr(ctx,10,20,12,9,3);ctx.fillStyle=b;rr(ctx,8,11,16,14,7);if(!isBack){ctx.fillStyle=l;rr(ctx,12,13,5,4,2);}},
    ()=>{ctx.fillStyle=sh;ctx.beginPath();ctx.moveTo(16,27);ctx.lineTo(7,20);ctx.lineTo(9,13);ctx.lineTo(23,13);ctx.lineTo(25,20);ctx.closePath();ctx.fill();ctx.fillStyle=b;ctx.beginPath();ctx.moveTo(16,25);ctx.lineTo(8,19);ctx.lineTo(10,10);ctx.lineTo(22,10);ctx.lineTo(24,19);ctx.closePath();ctx.fill();if(!isBack){ctx.fillStyle=l;ctx.fillRect(13,12,4,4);}},
  ];
  bodies[s.body]?.();
}

function drawBodySide(ctx,s,dir,C){
  const flip=dir==='right';
  const {b,s:sh,l}=C;
  // side body offset: slightly shift so face-side has room
  const ox=flip?2:0;
  const bodies=[
    ()=>{ctx.fillStyle=sh;rr(ctx,8+ox,19,14,10,3);ctx.fillStyle=b;rr(ctx,8+ox,10,14,16,5);ctx.fillStyle=l;rr(ctx,flip?10+ox:9+ox,12,4,4,2);},
    ()=>{ctx.fillStyle=sh;ctx.fillRect(8+ox,20,14,8);ctx.fillStyle=b;ctx.fillRect(8+ox,10,14,16);ctx.fillStyle=l;ctx.fillRect(flip?10+ox:9+ox,12,5,4);},
    ()=>{ctx.fillStyle=sh;rr(ctx,9+ox,21,11,7,2);ctx.fillStyle=b;rr(ctx,9+ox,8,12,18,4);ctx.fillStyle=l;rr(ctx,flip?11+ox:10+ox,10,4,5,2);},
    ()=>{ctx.fillStyle=sh;rr(ctx,6+ox,21,18,7,3);ctx.fillStyle=b;rr(ctx,6+ox,12,18,14,4);ctx.fillStyle=l;rr(ctx,flip?9+ox:8+ox,13,5,5,2);},
    ()=>{ctx.fillStyle=sh;tri(ctx,12+ox,20,9+ox,12,14+ox,12);tri(ctx,18+ox,20,16+ox,12,21+ox,12);ctx.fillStyle=b;rr(ctx,9+ox,14,13,13,3);ctx.fillStyle=l;rr(ctx,flip?12+ox:11+ox,15,4,4,1);},
    ()=>{ctx.fillStyle=sh;rr(ctx,7+ox,19,16,10,4);ctx.fillStyle=b;rr(ctx,8+ox,10,14,16,5);ctx.fillStyle=b;rr(ctx,6+ox,17,17,9,4);ctx.fillStyle=l;rr(ctx,flip?10+ox:9+ox,12,4,4,2);},
    ()=>{ctx.fillStyle=sh;rr(ctx,9+ox,20,12,9,3);ctx.fillStyle=b;rr(ctx,8+ox,11,14,14,7);ctx.fillStyle=l;rr(ctx,flip?10+ox:9+ox,13,4,4,2);},
    ()=>{ctx.fillStyle=sh;ctx.beginPath();ctx.moveTo(15+ox,27);ctx.lineTo(7+ox,20);ctx.lineTo(9+ox,13);ctx.lineTo(21+ox,13);ctx.lineTo(23+ox,20);ctx.closePath();ctx.fill();ctx.fillStyle=b;ctx.beginPath();ctx.moveTo(15+ox,25);ctx.lineTo(8+ox,19);ctx.lineTo(10+ox,10);ctx.lineTo(20+ox,10);ctx.lineTo(22+ox,19);ctx.closePath();ctx.fill();ctx.fillStyle=l;ctx.fillRect(flip?12+ox:11+ox,12,4,4);},
  ];
  bodies[s.body]?.();
}

// =====================================================
// FRONT VIEW
// =====================================================
function drawFront(ctx,s,C,bob,fleg,bleg){
  const {b,s:sh,l,d}=C;

  drawWingsFront(ctx,s,C,bob);
  drawArmsFront(ctx,s,C,bob);

  ctx.save();ctx.translate(0,bob);
  drawBodyFront(ctx,s,C,false);
  drawEars(ctx,s,C,'front');
  ctx.restore();

  drawHat(ctx,s,C,'front',bob);
  drawEyesFront(ctx,s,bob);
  drawMouthFront(ctx,s,bob);
  drawMarksFront(ctx,s,C,bob);

  // legs & feet — facing FORWARD, feet point outward
  // left leg
  ctx.fillStyle=sh;ctx.fillRect(11,25+fleg,4,4);
  ctx.fillStyle=b; ctx.fillRect(11,24+fleg,4,3);
  // left foot — points LEFT
  ctx.fillStyle=d; ctx.fillRect(8,28+fleg,6,2); ctx.fillRect(8,27+fleg,2,1);
  // right leg
  ctx.fillStyle=sh;ctx.fillRect(17,25+bleg,4,4);
  ctx.fillStyle=b; ctx.fillRect(17,24+bleg,4,3);
  // right foot — points RIGHT
  ctx.fillStyle=d; ctx.fillRect(18,28+bleg,6,2); ctx.fillRect(22,27+bleg,2,1);
}

// =====================================================
// BACK VIEW
// =====================================================
function drawBack(ctx,s,C,bob,fleg,bleg){
  const {b,s:sh,l,d}=C;

  drawWingsFront(ctx,s,C,bob);
  drawArmsFront(ctx,s,C,bob);

  ctx.save();ctx.translate(0,bob);
  drawBodyFront(ctx,s,C,true);
  drawEars(ctx,s,C,'back');
  // back detail
  ctx.fillStyle=sh+'55';ctx.fillRect(13,13,6,8);
  ctx.restore();

  if(s.tail>0) drawTailBack(ctx,s,C,bob);
  drawHat(ctx,s,C,'back',bob);

  // legs — same as front, feet point outward
  ctx.fillStyle=sh;ctx.fillRect(11,25+fleg,4,4);
  ctx.fillStyle=b; ctx.fillRect(11,24+fleg,4,3);
  ctx.fillStyle=d; ctx.fillRect(8,28+fleg,6,2); ctx.fillRect(8,27+fleg,2,1);

  ctx.fillStyle=sh;ctx.fillRect(17,25+bleg,4,4);
  ctx.fillStyle=b; ctx.fillRect(17,24+bleg,4,3);
  ctx.fillStyle=d; ctx.fillRect(18,28+bleg,6,2); ctx.fillRect(22,27+bleg,2,1);
}

// =====================================================
// SIDE VIEW
// =====================================================
function drawSide(ctx,s,dir,C,bob,flegOff,blegOff){
  const flip=dir==='right'; // flip=true means facing right
  const {b,s:sh,l,d}=C;

  // For a character FACING LEFT (flip=false):
  //   front of character = left side of canvas (small x)
  //   back of character  = right side of canvas (large x)
  //   front foot points LEFT (negative x direction)
  //   back leg is behind, partially hidden

  // For FACING RIGHT (flip=true): mirror everything

  drawWingsSide(ctx,s,C,dir,bob);

  // back leg (behind body, dimmer)
  // back leg x: when facing left, back leg is to the right ~x=16; facing right ~x=12
  {
    const lx=flip?12:16;
    ctx.fillStyle=sh+'88';ctx.fillRect(lx,25+blegOff,4,4);
    ctx.fillStyle=b+'aa';  ctx.fillRect(lx,24+blegOff,4,3);
    // back foot: when facing left → points left; facing right → points right
    ctx.fillStyle=d+'88';
    if(!flip) ctx.fillRect(lx-3,28+blegOff,6,2); // facing left, foot points left
    else      ctx.fillRect(lx+1,28+blegOff,6,2); // facing right, foot points right
  }

  drawArmSideBack(ctx,s,C,dir,bob);

  ctx.save();ctx.translate(0,bob);
  drawBodySide(ctx,s,dir,C);
  drawEars(ctx,s,C,dir);
  ctx.restore();

  drawArmSideFront(ctx,s,C,dir,bob);
  if(s.tail>0) drawTailSide(ctx,s,C,dir,bob);
  drawHat(ctx,s,C,dir,bob);
  drawEyeSide(ctx,s,dir,bob);
  drawMouthSide(ctx,s,dir,bob);
  drawMarksSide(ctx,s,C,dir,bob);

  // front leg (on top)
  {
    const lx=flip?16:12;
    ctx.fillStyle=sh;ctx.fillRect(lx,25+flegOff,4,4);
    ctx.fillStyle=b; ctx.fillRect(lx,24+flegOff,4,3);
    // front foot direction:
    // facing left (flip=false): foot points left → extend to lower x
    // facing right (flip=true): foot points right → extend to higher x
    ctx.fillStyle=d;
    if(!flip){
      ctx.fillRect(lx-3,28+flegOff,7,2); // foot extends left
      ctx.fillRect(lx-3,27+flegOff,2,1); // toe tip
    } else {
      ctx.fillRect(lx,28+flegOff,7,2);   // foot extends right
      ctx.fillRect(lx+5,27+flegOff,2,1); // toe tip
    }
  }
}

// =====================================================
// HATS
// =====================================================
function drawHat(ctx,s,C,dir,bob){
  const h=s.hat; if(h===0)return;
  const side=dir==='left'||dir==='right';
  const flip=dir==='right';
  const y=bob;
  const cx=side?(flip?17:13):16;

  if(h===1){ // flat cap
    ctx.fillStyle='#4a3010';
    ctx.fillRect(cx-6,7+y,12,3);  // brim
    ctx.fillRect(cx-4,4+y,8,4);   // top
    ctx.fillStyle='#6a4a20';
    ctx.fillRect(cx-4,4+y,8,2);
    if(!side){ctx.fillRect(cx-6,7+y,12,1);}
  }
  else if(h===2){ // witch hat
    ctx.fillStyle='#1a0a30';
    ctx.fillRect(cx-7,9+y,14,3);  // brim
    tri(ctx,cx,1+y,cx-5,9+y,cx+5,9+y); // cone
    ctx.fillStyle='#4a0a80';
    ctx.fillRect(cx-2,5+y,4,2);   // band
    ctx.fillStyle='#ffd700';
    ctx.fillRect(cx-1,5+y,2,2);   // buckle
  }
  else if(h===3){ // crown
    ctx.fillStyle='#f0c030';
    ctx.fillRect(cx-6,8+y,12,5);  // base
    // spikes
    tri(ctx,cx-5,8+y,cx-6,3+y,cx-3,8+y);
    tri(ctx,cx,8+y,cx-1,2+y,cx+1,8+y);
    tri(ctx,cx+4,8+y,cx+2,3+y,cx+6,8+y);
    ctx.fillStyle='#e00';
    ctx.fillRect(cx-4,9+y,2,2);ctx.fillRect(cx,9+y,2,2);ctx.fillRect(cx+3,9+y,1,2);
  }
  else if(h===4){ // beanie
    ctx.fillStyle='#c02020';
    rr(ctx,cx-6,5+y,12,8,4);
    ctx.fillStyle='#e04040';
    ctx.fillRect(cx-6,8+y,12,3);
    // stripes
    ctx.fillStyle='#fff';
    ctx.fillRect(cx-5,7+y,10,1);
    ctx.fillStyle='#e04040';
    circ(ctx,cx,5+y,2);
  }
  else if(h===5){ // top hat
    ctx.fillStyle='#111';
    ctx.fillRect(cx-7,9+y,14,2);  // brim
    ctx.fillRect(cx-5,2+y,10,8);  // tall top
    ctx.fillStyle='#333';

    ctx.fillRect(cx-6,10+y,12,1);
    if(!side){
      // knot at back
      ctx.fillStyle='#c03020';

function drawEars(ctx,s,C,dir){

  if(e===1){ // cat round

  }
  else if(e===2){ // pointy

  }
  else if(e===3){ // horns
    if(side){const hx=flip?20:11;ctx.fillStyle='#c62828';tri(ctx,hx,11,hx-2,2,hx+3,2);ctx.fillStyle='#ff5252';ctx.fillRect(hx,3,2,3);}
    else{ctx.fillStyle='#c62828';tri(ctx,11,11,9,2,13,2);tri(ctx,21,11,19,2,23,2);ctx.fillStyle='#ff5252';ctx.fillRect(10,3,2,3);ctx.fillRect(20,3,2,3);}
  }
  else if(e===4){ // antenna
    ctx.fillStyle='#ffeb3b';ctx.fillRect(15,1,2,10);ctx.fillStyle='#ff8f00';circ(ctx,16,1,3);
    if(!side){ctx.fillRect(10,3,2,8);ctx.fillStyle='#ff8f00';circ(ctx,11,3,3);}
  }
  else if(e===5){ // floppy
    if(side){
      const ex=flip?20:6;const ew=flip?-5:5;
      ctx.fillStyle=sh;rr(ctx,Math.min(ex,ex+ew),9,6,13,3);
      ctx.fillStyle=b;rr(ctx,Math.min(ex,ex+ew)+1,10,4,11,2);
    } else {
      ctx.fillStyle=sh;rr(ctx,4,9,7,14,3);rr(ctx,21,9,7,14,3);
      ctx.fillStyle=b;rr(ctx,5,10,5,12,2);rr(ctx,22,10,5,12,2);

    else{ctx.fillStyle=b;tri(ctx,10,14,2,2,12,8);tri(ctx,22,14,30,2,20,8);ctx.fillStyle=sh+'88';tri(ctx,10,14,4,6,11,10);tri(ctx,22,14,28,6,21,10);}
  }
}

function drawMarksSide(ctx,s,C,dir,bob){
  const m=s.marks;if(m===0)return;
  const flip=dir==='right';const {b,s:sh,l}=C;
  const bx=flip?10:8;const y=bob;
  if(m===1){ctx.fillStyle=sh+'77';ctx.fillRect(bx+2,13+y,2,8);ctx.fillRect(bx+6,13+y,2,8);}
  else if(m===2){ctx.fillStyle=sh+'aa';circ(ctx,bx+3,15+y,2);circ(ctx,bx+8,14+y,1);}
  else if(m===3){ctx.fillStyle=l;rr(ctx,bx+3,15+y,5,8,2);}
  else if(m===4){ctx.fillStyle='#e53935';ctx.fillRect(flip?bx+7:bx+1,13+y,4,2);}
  else if(m===5){ctx.fillStyle=sh+'66';ctx.fillRect(bx+2,12+y,3,3);ctx.fillRect(bx+5,15+y,3,3);}
}

// =====================================================
// FRAME RENDER
// =====================================================
function makeFrame(s,dir,frame){
  const c=document.createElement('canvas');c.width=32;c.height=32;
  const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=false;
  drawCreature(ctx,s,dir,frame);
  return c;
}
function renderBig(){
  const wf=WALK[animFrame];
  const cv=document.getElementById('cv-big');
  const ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,192,192);
  ctx.drawImage(makeFrame(sel,curDir,wf),0,0,192,192);
}
function renderSheet(){
  const sheet=document.getElementById('cv-export');
  const ctx=sheet.getContext('2d');ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,96,128);
  ['down','left','right','up'].forEach((dir,row)=>{
    [0,1,2].forEach((frame,col)=>{
      ctx.drawImage(makeFrame(sel,dir,frame),col*32,row*32);
    });
  });
}
function renderAll(){renderBig();renderSheet();}

// =====================================================
// ANIM
// =====================================================
function tick(){animFrame=(animFrame+1)%WALK.length;renderBig();}
function startAnim(){if(animInterval)clearInterval(animInterval);animInterval=setInterval(tick,animSpeed);}
function toggleAnim(){animPlaying=!animPlaying;document.getElementById('anim-btn').textContent=animPlaying?'⏸':'▶';if(animPlaying)startAnim();else clearInterval(animInterval);}
function updateSpeed(v){animSpeed=parseInt(v);document.getElementById('speed-val').textContent=v;if(animPlaying)startAnim();}
function setDir(d){curDir=d;renderBig();}

function downloadSheet(){
  renderSheet();
  document.getElementById('cv-export').toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='creature_96x128.png';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  },'image/png');
}
function randomize(){
  Object.keys(PARTS).forEach(p=>sel[p]=Math.floor(Math.random()*PARTS[p]));
  sel.color=Math.floor(Math.random()*COLORS.length);
  updateUI();renderAll();
}

// =====================================================
// UI
// =====================================================
function updateUI(){
  document.querySelectorAll('#opts-body .sil-btn').forEach((btn,i)=>btn.classList.toggle('selected',i===sel.body));
  ['hat','eyes','ears','mouth','arms','wings','tail','marks'].forEach(part=>{
    document.querySelectorAll(`#opts-${part} .part-btn`).forEach((btn,i)=>btn.classList.toggle('selected',i===sel[part]));
  });
  document.querySelectorAll('.color-swatch').forEach((sw,i)=>sw.classList.toggle('selected',i===sel.color));
  refreshMinis();
}
function refreshMinis(){
  ['hat','eyes','ears','mouth','arms','wings','tail','marks'].forEach(part=>{
    document.querySelectorAll(`#opts-${part} .part-btn`).forEach((btn,i)=>{
      const mc=btn.querySelector('canvas');if(!mc)return;
      const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
      drawCreature(mctx,{...sel,[part]:i},'down',0);
    });
  });
  document.querySelectorAll('#opts-body .sil-btn').forEach((btn,i)=>{
    const mc=btn.querySelector('canvas');if(!mc)return;
    const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
    drawCreature(mctx,{...sel,body:i},'down',0);
  });
}
function buildColors(){
  const row=document.getElementById('color-row');
  COLORS.forEach((c,i)=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(i===sel.color?' selected':'');
    sw.style.background=c.b;sw.title=c.n;
    sw.onclick=()=>{sel.color=i;updateUI();renderAll();};
    row.appendChild(sw);
  });
}
function buildBody(){
  const container=document.getElementById('opts-body');
  for(let i=0;i<PARTS.body;i++){
    const btn=document.createElement('button');
    btn.className='sil-btn'+(i===sel.body?' selected':'');
    const mc=document.createElement('canvas');mc.width=32;mc.height=40;
    mc.style.cssText='width:30px;height:38px;display:block;image-rendering:pixelated;';
    const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
    drawCreature(mctx,{...sel,body:i},'down',0);
    btn.appendChild(mc);btn.onclick=()=>{sel.body=i;updateUI();renderAll();};
    container.appendChild(btn);
  }
}
function buildParts(part,count){
  const container=document.getElementById('opts-'+part);
  const noneFirst=part==='hat'||part==='tail'||part==='arms'||part==='wings'||part==='marks';
  for(let i=0;i<count;i++){
    const btn=document.createElement('button');
    btn.className='part-btn'+(i===sel[part]?' selected':'');
    if(i===0&&noneFirst){
      btn.innerHTML='<span style="font-size:15px;color:#9090c0;line-height:34px;">✕</span>';
    } else {
      const mc=document.createElement('canvas');mc.width=32;mc.height=32;
      mc.style.cssText='width:32px;height:32px;display:block;image-rendering:pixelated;';
      const mctx=mc.getContext('2d');mctx.imageSmoothingEnabled=false;
      drawCreature(mctx,{...sel,[part]:i},'down',0);
      btn.appendChild(mc);
    }
    btn.onclick=()=>{sel[part]=i;updateUI();renderAll();};
    container.appendChild(btn);
  }
}

buildColors();
buildBody();
['hat','eyes','ears','mouth','arms','wings','tail','marks'].forEach(p=>buildParts(p,PARTS[p]));
renderAll();
startAnim();
</script>
</body></html>
